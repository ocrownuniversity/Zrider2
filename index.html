<!DOCTYPE html>

<script>
  // Captured as the very first thing on the page, before anything else
  // loads. Chrome can fire 'beforeinstallprompt' the instant it decides a
  // page is installable — sometimes before the rest of our app's script
  // (loaded near the end of the page) even runs. Attaching this listener
  // here, first, means we never miss that event no matter how fast it
  // fires. The main app script below picks this up in setupPWA().
  window.__zrDeferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    window.__zrDeferredInstallPrompt = e;
  });
</script>

<style>
:root{
  /* === Zrider Theme (white & green) === */
  --green-900:#0E3B22; --green-700:#14502E; --green-600:#1B6B3D; --green-100:#1F7A45;
  --amber-500:#1B6B3D; --amber-600:#14502E; --amber-100:#E3F5EA;
  --ink-900:#0A0A0A; --ink-700:#333333; --ink-400:#707070; --ink-200:#E5E5E5;
  --surface-0:#FFFFFF; --surface-1:#FFFFFF; --surface-2:#F0F0F0;
  --red-600:#D8362A; --red-100:#FCE6E4;
  /* Dedicated input/field colors — deliberately NOT the same as the card
     surfaces, so every text field, textarea, and select stands out clearly
     against any card, modal, or sheet in the app instead of blending in. */
  --field-bg:#FFFFFF; --field-text:#0A0A0A; --field-border:#0A0A0A;
  --field-border-focus:var(--amber-500); --field-placeholder:#8A8A8A;
  --radius-s:10px; --radius-m:16px; --radius-l:24px;
  --shadow-card:0 1px 2px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.08);
  --shadow-pop:0 12px 40px rgba(0,0,0,.25);
  --font-display:'Plus Jakarta Sans',system-ui,sans-serif; --font-body:'Inter','Noto Sans',system-ui,sans-serif; --font-mono:'Noto Sans','Inter',system-ui,sans-serif;
  --fs-base:19px; --fs-h1:36px; --fs-h2:27px; --fs-h3:21px; --fs-body:18px; --fs-label:16px; --fs-small:15px;
  /* accent colours kept for interactive elements */
  --accent:#1B6B3D;
  --accent-dim:#E3F5EA;
}
body[data-theme="dark"]{
  --green-900:#0E3B22; --green-700:#14502E; --green-600:#1B6B3D; --green-100:#1F7A45;
  --amber-500:#2FA860; --amber-600:#1F7A45; --amber-100:#12271A;
  --ink-900:#F5F6F7; --ink-700:#C7CBD1; --ink-400:#8B9AA1; --ink-200:#2A2D32;
  --surface-0:#17191C; --surface-1:#0A0B0C; --surface-2:#24272C;
  --red-600:#FF6B5B; --red-100:#341210;
  --field-bg:#1C1F23; --field-text:#F2F4F5; --field-border:#3A3F45;
  --field-placeholder:#7A8188;
  --shadow-card:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
  --shadow-pop:0 12px 40px rgba(0,0,0,.7);
  --accent-dim:#12271A;
}
body[data-theme="dark"]{ background:#0A0B0C; }
body[data-theme="dark"] .auth-screen{ background:#0A0B0C; }
@media (min-width:481px){ body[data-theme="dark"]{ background:radial-gradient(ellipse at 50% -10%, #1a1d20 0%, #000000 65%); } body[data-theme="dark"] #zr-root{ box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 30px 80px rgba(0,0,0,.8); } }
body[data-theme="dark"] .brand-name{ color:var(--ink-900); }
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:#FFFFFF;}
body{font-family:var(--font-body);font-size:var(--fs-base);line-height:1.5;color:var(--ink-900);-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button{font-family:inherit;} input,select,textarea{font-family:inherit;color:var(--field-text);background:var(--field-bg);border-color:var(--field-border);}
::selection{background:var(--amber-100);} a{color:inherit;}
.hidden{display:none !important;} .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;}

#zr-root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--surface-1);position:relative;overflow-x:hidden;display:flex;flex-direction:column;}
@media (min-width:481px){body{display:flex;justify-content:center;background:#EDEDED;} #zr-root{box-shadow:0 0 0 1px rgba(0,0,0,.08), 0 30px 80px rgba(0,0,0,.18);}}

.route-stripe{height:4px;width:100%;background:repeating-linear-gradient(90deg, var(--amber-500) 0 14px, transparent 14px 24px);border-radius:2px;}
.route-stripe.vert{width:4px;height:100%;background:repeating-linear-gradient(180deg, var(--amber-500) 0 14px, transparent 14px 24px);}

h1,h2,h3,.zr-display{font-family:var(--font-display);font-weight:700;color:var(--ink-900);margin:0;letter-spacing:-.01em;line-height:1.2;}
h1{font-size:var(--fs-h1);} h2{font-size:var(--fs-h2);} h3{font-size:var(--fs-h3);}
.zr-eyebrow{font-family:var(--font-mono);font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--amber-500);font-weight:700;}
p{margin:0;line-height:1.55;font-size:var(--fs-body);} .muted{color:var(--ink-400);font-size:var(--fs-small);}
.meter{font-family:var(--font-body);font-weight:800;letter-spacing:.01em;font-variant-numeric:tabular-nums;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius-s);font-family:var(--font-body);font-weight:600;font-size:16px;padding:15px 18px;cursor:pointer;transition:transform .12s ease, opacity .15s ease;width:100%;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--amber-500);color:#fff;} .btn-primary:hover{background:var(--amber-600);}
.btn-amber{background:var(--amber-500);color:#fff;} .btn-amber:hover{background:var(--amber-600);}
.btn-outline{background:transparent;color:var(--amber-500);border:1.5px solid var(--amber-500);}
.btn-outline.active-day{background:var(--amber-500);color:#fff;}
.btn-ghost{background:transparent;color:var(--ink-700);}
.btn-danger{background:var(--red-600);color:#fff;}
.btn-sm{padding:10px 14px;font-size:14px;width:auto;}
.btn-block-row{display:flex;gap:10px;}
.btn[disabled]{opacity:.4;pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:var(--fs-label);font-weight:600;color:var(--ink-700);margin-bottom:6px;letter-spacing:.01em;}
.field input, .field select, .field textarea{width:100%;padding:14px;border-radius:var(--radius-s);border:1.5px solid var(--field-border);background:var(--field-bg);font-size:16px;color:var(--field-text);outline:none;transition:border-color .15s, box-shadow .15s;}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--field-border-focus);box-shadow:0 0 0 3px rgba(27,138,74,.18);}
.field input::placeholder, .field textarea::placeholder{color:var(--field-placeholder);}
.field .hint{font-size:15px;color:var(--ink-400);margin-top:4px;}

.card{background:var(--surface-0);border-radius:var(--radius-m);padding:16px;box-shadow:var(--shadow-card);border:1px solid var(--surface-2);}
.card + .card{margin-top:12px;}

.pill{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;padding:6px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em;}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.pill-green{background:rgba(27,138,74,.15);color:var(--amber-500);}
.pill-amber{background:rgba(27,138,74,.12);color:var(--amber-500);}
.pill-red{background:var(--red-100);color:var(--red-600);}
.pill-grey{background:var(--surface-2);color:var(--ink-400);}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-0);position:sticky;top:0;z-index:30;border-bottom:1px solid var(--surface-2);}
.topbar .brand{display:flex;align-items:center;gap:8px;}
.brand-mark{width:30px;height:30px;border-radius:8px;background:var(--amber-500);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:800;font-size:15px;}
.brand-name{font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-.01em;color:var(--ink-900);}
.brand-name .accent{color:var(--amber-600);}

.bottomnav{position:sticky;bottom:0;z-index:30;display:flex;background:var(--surface-0);border-top:1px solid var(--surface-2);padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.bottomnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:8px 2px;color:var(--ink-400);font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;}
.bottomnav button.active{color:var(--amber-500);}
.bottomnav button svg{width:21px;height:21px;}
.bottomnav button{position:relative;}
.nav-badge{position:absolute;top:2px;right:calc(50% - 20px);min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--red-600);color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 0 0 2px var(--surface-0);}

.screen{flex:1;display:flex;flex-direction:column;min-height:0;}
.screen-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:24px;}

.map-wrap{position:relative;width:100%;height:44vh;min-height:340px;max-height:520px;background:var(--surface-2);overflow:hidden;}
.map-wrap .gmap{width:100%;height:100%;}
.map-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--ink-400);font-size:12px;text-align:center;padding:20px;background:repeating-linear-gradient(135deg, #1B6B3D 0 12px, #0E3B22 12px 24px);}

.sheet{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;margin-top:-20px;position:relative;z-index:2;box-shadow:0 -6px 40px rgba(0,0,0,.6);padding:18px 16px 16px;flex:1;border-top:1px solid var(--surface-2);}
.sheet-handle{width:36px;height:4px;background:var(--surface-2);border-radius:2px;margin:0 auto 14px;}

.auth-screen{min-height:100vh;display:flex;flex-direction:column;background:#FFFFFF;color:var(--ink-900);}
.auth-hero{padding:48px 24px 24px;background:linear-gradient(160deg,#1B6B3D 0%,#0E3B22 60%);}
.auth-hero .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.auth-hero .brand-mark{background:var(--amber-500);color:#fff;}
.auth-hero h1{color:#fff;font-size:34px;line-height:1.15;}
.auth-hero p{color:rgba(255,255,255,.6);margin-top:8px;font-size:16px;}
.auth-card{background:var(--surface-0);border-radius:var(--radius-l) var(--radius-l) 0 0;flex:1;padding:24px;margin-top:20px;border-top:1px solid var(--surface-2);}
.role-toggle{display:flex;gap:8px;background:var(--surface-2);padding:4px;border-radius:var(--radius-s);margin-bottom:18px;}
.role-toggle button{flex:1;border:none;background:none;padding:10px;border-radius:8px;font-weight:600;font-size:14.5px;color:var(--ink-400);cursor:pointer;}
.role-toggle button.active{background:var(--amber-500);color:#fff;box-shadow:0 2px 8px rgba(27,138,74,.3);}
.role-card-row{display:flex;gap:10px;margin-bottom:16px;}
.role-card{flex:1;position:relative;background:#fff;border-radius:16px;padding:14px 8px 12px;text-align:center;cursor:pointer;border:2.5px solid transparent;transition:.15s;}
.role-card.active{border-color:var(--amber-500);}
.role-card .role-card-icon{width:100%;height:64px;display:flex;align-items:center;justify-content:center;font-size:38px;}
.role-card p{color:#111;font-weight:700;font-size:13.5px;margin-top:6px;}
.role-card .role-card-check{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--amber-500);color:#fff;display:none;align-items:center;justify-content:center;font-size:12px;}
.role-card.active .role-card-check{display:flex;}
.service-tile-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin:14px 0;}
.service-tile{flex-shrink:0;width:88px;background:var(--surface-2);border:1px solid var(--field-border);border-radius:14px;padding:12px 6px;text-align:center;}
.service-tile .service-tile-icon{font-size:28px;}
.service-tile p{color:var(--ink-900);font-size:11px;font-weight:700;margin-top:6px;line-height:1.3;}
.tab-link{text-align:center;font-size:14.5px;color:var(--ink-400);margin-top:16px;}
.tab-link b{color:var(--amber-500);cursor:pointer;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:90;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
@media (min-width:481px){.overlay{justify-content:center;}}
.modal{background:var(--surface-0);width:100%;max-width:480px;border-radius:var(--radius-l) var(--radius-l) 0 0;padding:20px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-pop);animation:slideup .22s ease;border-top:1px solid var(--surface-2);}
@keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-close{background:var(--surface-2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--ink-700);}

#zr-toasts{position:fixed;top:14px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
.toast{background:var(--surface-2);color:var(--ink-900);font-size:14.5px;font-weight:500;padding:11px 17px;border-radius:999px;box-shadow:var(--shadow-pop);max-width:88%;text-align:center;border:1px solid var(--surface-2);}
.toast.err{background:var(--red-600);color:#fff;border-color:var(--red-600);}
.toast.ok{background:var(--amber-500);color:#fff;border-color:var(--amber-500);}

.row{display:flex;align-items:center;justify-content:space-between;} .row.gap{gap:10px;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--surface-2);color:var(--amber-500);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);overflow:hidden;flex-shrink:0;border:1.5px solid var(--surface-2);}
.avatar img{width:100%;height:100%;object-fit:cover;}
.divider{height:1px;background:var(--surface-2);margin:14px 0;}
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-400);}
.empty-state svg{width:48px;height:48px;color:var(--ink-200);margin-bottom:10px;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
.spinner.dark{border-color:var(--surface-2);border-top-color:var(--amber-500);}
@keyframes spin{to{transform:rotate(360deg);}}
.skel{background:linear-gradient(90deg,var(--surface-2) 25%,#2a2a2a 37%,var(--surface-2) 63%);background-size:400% 100%;animation:skel 1.4s ease infinite;border-radius:8px;}
@keyframes skel{0%{background-position:100% 50%}100%{background-position:0 50%}}
.badge-verify{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;color:var(--amber-500);}
.tabs-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.tabs-row::-webkit-scrollbar{display:none;}
.tabs-row button{flex-shrink:0;border:1.5px solid var(--surface-2);background:var(--surface-0);padding:9px 15px;border-radius:999px;font-size:14px;font-weight:600;color:var(--ink-700);cursor:pointer;}
.tabs-row button.active{background:var(--amber-500);color:#fff;border-color:var(--amber-500);}
.stat-box{background:var(--surface-0);border-radius:var(--radius-m);padding:18px;color:var(--ink-900);border:1px solid var(--surface-2);position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--amber-500);}
.stat-box .meter{font-size:28px;color:var(--amber-500);}
.stat-box[style*="background:var(--green-700)"] .meter{color:#fff;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-700);}
.fab{position:absolute;bottom:18px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--red-600);color:#fff;border:none;box-shadow:var(--shadow-pop);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;}
.list-item + .list-item{border-top:1px solid var(--surface-2);}
.doc-row{display:flex;align-items:center;justify-content:space-between;border:1.5px dashed var(--surface-2);border-radius:var(--radius-s);padding:12px;margin-bottom:10px;}
.star-row{display:flex;gap:4px;}
.star-row svg{width:26px;height:26px;cursor:pointer;color:var(--surface-2);}
.star-row svg.on{color:var(--amber-500);}

/* Glowing amber accent line under active nav items */
.bottomnav button.active::after{content:'';display:block;width:18px;height:2px;background:var(--amber-500);border-radius:1px;margin-top:1px;box-shadow:0 0 6px var(--amber-500);}

/* Input search boxes in admin */
#a-rider-search, #a-passenger-search{background:var(--field-bg);border:1.5px solid var(--field-border);color:var(--field-text);}
#a-rider-search:focus, #a-passenger-search:focus{border-color:var(--amber-500);outline:none;}
#a-rider-search::placeholder, #a-passenger-search::placeholder{color:var(--ink-400);}

/* ============================================================================
   READABILITY UPGRADE
   Many small text elements throughout the templates use inline font-size
   styles (set at design time when the app targeted a small, fixed body copy
   size). Rather than rewriting every inline style by hand, the rules below
   bump each of those specific inline pixel sizes up a notch so the whole
   app reads comfortably larger, while preserving the original layout
   proportions and hierarchy. Larger inline sizes (icons/emoji/big numbers)
   are intentionally left untouched.
   ========================================================================= */
[style*="font-size:9.5px"]{font-size:13px !important;}
[style*="font-size:10px"]{font-size:13.5px !important;}
[style*="font-size:10.5px"]{font-size:14px !important;}
[style*="font-size:11px"]{font-size:14.5px !important;}
[style*="font-size:12px"]{font-size:15.5px !important;}
[style*="font-size:12.5px"]{font-size:16px !important;}
[style*="font-size:13px"]{font-size:16.5px !important;}
[style*="font-size:13.5px"]{font-size:17px !important;}
[style*="font-size:14px"]{font-size:17.5px !important;}
[style*="font-size:15px"]{font-size:18px !important;}
[style*="font-size:16px"]{font-size:18.5px !important;}
[style*="font-size:17px"]{font-size:19.5px !important;}
[style*="font-size:18px"]{font-size:20.5px !important;}

/* ---------- MOBILE RESPONSIVENESS ---------- */
@media (max-width:380px){
  :root{ --fs-h1:31px; --fs-h2:23px; --fs-h3:20px; }
  .auth-hero h1{font-size:32px;}
  .screen-body{padding:14px;}
  .btn{padding:14px 16px;}
}
@media (min-width:481px){
  html{ -webkit-text-size-adjust:100%; }
}

/* ---------- FREE ADDRESS AUTOCOMPLETE DROPDOWN ---------- */
.zr-suggest-list{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--surface-0);border:1.5px solid var(--surface-2);border-radius:var(--radius-s);box-shadow:var(--shadow-pop);z-index:40;max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.zr-suggest-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:11px 12px;cursor:pointer;font-size:14.5px;color:var(--ink-900);border-bottom:1px solid var(--surface-2);}
.zr-suggest-item:last-child{border-bottom:none;}
.zr-suggest-item:hover, .zr-suggest-item:active{background:var(--surface-2);}

<template id="tpl-modal-about">
  <div class="modal" style="max-height:85vh;overflow-y:auto;">
    <div class="modal-head"><h3>Our Story</h3><button class="modal-close" data-close>✕</button></div>
    <p style="font-size:14.5px;line-height:1.7;">Zrider began as a response to a familiar frustration: unclear pricing, unverifiable riders, and no way to track a trip once it started. Ogun State's roads connect Abeokuta, Sagamu, Ijebu Ode, and everywhere in between — but getting a safe, fairly-priced ride between them was often left to chance.</p>
    <p style="font-size:14.5px;line-height:1.7;margin-top:12px;">We built Zrider around three commitments: transparent, meter-based pricing calculated before you ever confirm a trip; verified riders with a unique Rider ID that any passenger can check before boarding; and a platform that treats your daily commute, not just one-off trips, as something worth designing for — which is why recurring Scheduled Rides and Dispatch Delivery exist alongside standard bike rides.</p>
    <p style="font-size:14.5px;line-height:1.7;margin-top:12px;">We're based in Ogun State, built for Ogun State, and growing one verified trip at a time.</p>
  </div>
</template>

<!-- Rider offline/online toggle (idle, no ride) -->

<template id="tpl-a-pricing">
  <h2>Pricing & fare rules</h2>
  <div class="card" style="margin-top:14px;">
    <div class="field"><label>Base fare (₦)</label><input type="number" id="a-price-base"></div>
    <div class="field"><label>Rate per km (₦)</label><input type="number" id="a-price-perkm"></div>
    <div class="field"><label>Rate per minute (₦)</label><input type="number" id="a-price-permin"></div>
    <div class="field"><label>Minimum fare (₦)</label><input type="number" id="a-price-min"></div>
    <button class="btn btn-primary" id="a-save-pricing">Save pricing rules</button>
  </div>

  <h2 style="margin-top:24px;">Rider & company split</h2>
  <p class="muted" style="margin-top:6px;">Control how every trip fare is divided between the rider and Zrider. Change this anytime — it applies to every trip completed after you save.</p>
  <div class="card" style="margin-top:14px;">
    <div class="field">
      <label>Rider gets (%)</label>
      <input type="number" id="a-split-rider" min="0" max="100" step="1">
    </div>
    <div class="field">
      <label>Company gets (%)</label>
      <input type="number" id="a-split-company" min="0" max="100" step="1">
    </div>
    <div class="card" style="background:var(--green-100);margin-bottom:14px;">
      <div class="zr-eyebrow">EXAMPLE ON A ₦1,000 TRIP</div>
      <div id="a-split-preview" style="margin-top:8px;font-weight:600;"></div>
    </div>
    <button class="btn btn-primary" id="a-save-split">Save split</button>
  </div>
</template>

<template id="tpl-a-area">
  <h2>Service areas</h2>
  <p class="muted" style="margin-top:6px;">Zrider operates across all zones listed below. Rides must start and end within the same zone or any active zone.</p>
  <div id="a-zone-list" style="margin-top:14px;"></div>
  <div class="card" style="margin-top:14px;background:var(--green-100);">
    <div class="zr-eyebrow">ACTIVE ZONES</div>
    <div id="a-zone-summary" style="margin-top:8px;"></div>
  </div>
</template>

<template id="tpl-a-withdrawals">
  <h2>Withdrawal requests</h2>
  <div id="a-withdrawals-list" style="margin-top:14px;"></div>
</template>

<template id="tpl-a-complaints">
  <h2>Complaints</h2>
  <div id="a-complaints-list" style="margin-top:14px;"></div>
</template>

<template id="tpl-a-broadcast">
  <h2>Send notification</h2>
  <div class="card" style="margin-top:14px;">
    <div class="field"><label>Audience</label>
      <select id="a-broadcast-audience"><option value="all">Everyone</option><option value="passenger">Passengers only</option><option value="rider">Riders only</option></select>
    </div>
    <div class="field"><label>Title</label><input type="text" id="a-broadcast-title" placeholder="e.g. Scheduled maintenance"></div>
    <div class="field"><label>Message</label><textarea id="a-broadcast-message" rows="3" placeholder="Write your message…"></textarea></div>
    <button class="btn btn-primary" id="a-send-broadcast">Send notification</button>
  </div>
</template>

<template id="tpl-a-settings">
  <h2>App settings</h2>
  <div class="card" style="margin-top:14px;">
    <div class="zr-eyebrow">CUSTOMER SUPPORT</div>
    <p class="muted" style="margin-top:6px;margin-bottom:10px;">This number appears as a tap-to-call button on every passenger and rider dashboard. Updates apply instantly — no app update needed.</p>
    <div class="field"><label>Support phone number</label><input type="tel" id="a-support-phone" placeholder="+2348012345678"></div>
    <div class="field"><label>WhatsApp number <span style="color:var(--ink-400);font-weight:400;">(optional — falls back to support number above if blank)</span></label><input type="tel" id="a-whatsapp-number" placeholder="+2348012345678"></div>
    <button class="btn btn-primary" id="a-save-support-phone">Save</button>
  </div>
</template>

<template id="tpl-a-commute">
  <div class="row"><h2>Scheduled Rides</h2><button class="btn btn-outline btn-sm" id="a-commute-export">⬇ Export CSV</button></div>
  <div class="card" style="margin-top:14px;">
    <div class="zr-eyebrow">DISCOUNT BY DURATION</div>
    <p class="muted" style="margin-top:6px;margin-bottom:10px;font-size:12px;">The per-trip price always comes straight from your Pricing tab's fare rules (base fare, per-km, per-min) — these percentages are just the extra discount applied for longer commitments.</p>
    <div class="row gap" style="flex-wrap:wrap;">
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">1 Week %</label><input type="number" id="a-cd-1w" min="0" max="100"></div>
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">2 Weeks %</label><input type="number" id="a-cd-2w" min="0" max="100"></div>
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">1 Month %</label><input type="number" id="a-cd-1m" min="0" max="100"></div>
    </div>
    <div class="row gap" style="flex-wrap:wrap;">
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">3 Months %</label><input type="number" id="a-cd-3m" min="0" max="100"></div>
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">6 Months %</label><input type="number" id="a-cd-6m" min="0" max="100"></div>
      <div class="field" style="flex:1;min-width:100px;"><label style="font-size:11px;">Custom %</label><input type="number" id="a-cd-custom" min="0" max="100"></div>
    </div>
    <button class="btn btn-primary btn-sm" id="a-cd-save">Save discounts</button>
  </div>
  <div class="row gap" style="margin-top:12px;flex-wrap:wrap;">
    <input type="text" id="a-commute-search" placeholder="Search by customer name…" style="flex:1;min-width:180px;">
    <select id="a-commute-filter">
      <option value="all">All statuses</option>
      <option value="pending_approval">Pending approval</option>
      <option value="active">Active</option>
      <option value="paused">Paused</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>
  <h3 style="margin-top:18px;">Today's upcoming rides</h3>
  <div id="a-commute-today" style="margin-top:8px;"><div class="skel" style="height:60px;"></div></div>
  <h3 style="margin-top:18px;">All subscriptions</h3>
  <div id="a-commute-list" style="margin-top:8px;"><div class="skel" style="height:100px;"></div></div>
</template>

<template id="tpl-a-dispatch">
  <h2>Dispatch Delivery</h2>
  <div class="card" style="margin-top:14px;">
    <div class="zr-eyebrow">PRICING</div>
    <div class="row gap" style="margin-top:10px;">
      <div class="field" style="flex:1;"><label>Base fee (₦)</label><input type="number" id="a-disp-base"></div>
      <div class="field" style="flex:1;"><label>Per km (₦)</label><input type="number" id="a-disp-perkm"></div>
    </div>
    <div class="row gap">
      <div class="field" style="flex:1;"><label>Per kg (₦)</label><input type="number" id="a-disp-perkg"></div>
      <div class="field" style="flex:1;"><label>Minimum fee (₦)</label><input type="number" id="a-disp-min"></div>
    </div>
    <button class="btn btn-primary btn-sm" id="a-disp-save-pricing">Save pricing</button>
  </div>
  <div class="row gap" style="margin-top:14px;">
    <div class="stat-box" style="flex:1;"><p style="color:var(--ink-400);font-size:11px;">DELIVERIES TODAY</p><span class="meter" id="a-disp-today-count">0</span></div>
    <div class="stat-box" style="flex:1;background:var(--green-700);"><p style="color:rgba(255,255,255,.7);font-size:11px;">REVENUE TODAY</p><span class="meter" id="a-disp-today-revenue">₦0</span></div>
  </div>
  <div class="row gap" style="margin-top:12px;flex-wrap:wrap;">
    <input type="text" id="a-disp-search" placeholder="Search by customer name…" style="flex:1;min-width:180px;">
    <select id="a-disp-filter">
      <option value="all">All statuses</option>
      <option value="pending">Pending</option>
      <option value="accepted">Accepted</option>
      <option value="heading_to_pickup">Heading to pickup</option>
      <option value="picked_up">Picked up</option>
      <option value="in_transit">In transit</option>
      <option value="delivered">Delivered</option>
      <option value="disputed">Disputed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>
  <div id="a-disp-list" style="margin-top:12px;"><div class="skel" style="height:100px;"></div></div>
</template>

function setupPWA(){
  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => {
        // Check for updates in background
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              toast('Zrider updated — refresh to get the latest.','ok');
            }
          });
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
  }

  if(IS_STANDALONE){ return; } // already installed — never show install UI

  // Pick up an install prompt that may have already fired before this
  // script even ran (captured by the tiny inline script at the very top
  // of <head>) — this is the fix for the prompt being missed on fast
  // page loads.
  if(window.__zrDeferredInstallPrompt){
    deferredInstallPrompt = window.__zrDeferredInstallPrompt;
  }

  // Also keep listening directly, in case it fires later (e.g. Chrome
  // takes a moment to finish its installability checks on a first visit).
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredInstallPrompt = e;
    window.__zrDeferredInstallPrompt = e;
    showInstallBanner();
    showInstallButtons();
  });

  window.addEventListener('appinstalled', ()=>{
    deferredInstallPrompt = null;
    const b = document.getElementById('zr-install-banner');
    if(b) b.remove();
    hideInstallButtons();
    toast('Zrider installed! Find it on your home screen.','ok');
  });

  // iOS Safari never fires beforeinstallprompt, but "Add to Home Screen"
  // still works there via the Share sheet — so still surface a button
  // that opens step-by-step instructions instead of a native prompt.
  if(IS_IOS) showInstallButtons();

  // Wire every install button already in the DOM (topbar + auth screen).
  // A MutationObserver keeps newly-mounted screens' buttons wired too,
  // since templates are re-cloned into the DOM on navigation.
  wireInstallButtons();
  const mo = new MutationObserver(()=> wireInstallButtons());
  mo.observe(document.getElementById('zr-root') || document.body, { childList:true, subtree:true });
}

function showInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{ const b = document.getElementById(id); if(b) b.classList.remove('hidden'); });
}
function hideInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{ const b = document.getElementById(id); if(b) b.classList.add('hidden'); });
}
function wireInstallButtons(){
  INSTALL_BTN_IDS.forEach(id=>{
    const b = document.getElementById(id);
    if(!b) return;
    // Always discoverable (not just after the browser fires
    // beforeinstallprompt) — tapping it either triggers the native
    // install prompt if it's ready, or opens free step-by-step
    // instructions otherwise. Never shown once already installed.
    b.classList.remove('hidden');
    if(b.dataset.wired) return;
    b.dataset.wired = '1';
    b.addEventListener('click', onInstallButtonClick);
  });
}
async function onInstallButtonClick(){

}

function fmtNaira(n){ return '₦' + Math.round(n||0).toLocaleString('en-NG'); }

function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d.getTime())/1000);
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60)+'m ago';
  if(diff < 86400) return Math.floor(diff/3600)+'h ago';
  return d.toLocaleDateString();
}
// Renders a simple horizontal progress stepper (e.g. Accepted → Arriving → In progress → Completed).

      const color = (done||active) ? 'var(--green-700)' : 'var(--surface-2)';
      const textColor = (done||active) ? 'var(--ink-900)' : 'var(--ink-400)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">

// ---------- GEO / FARE ----------
function toRad(d){ return d * Math.PI / 180; }
function haversineKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ============================================================================
// FREE ROUTING & GEOCODING INFRASTRUCTURE (OpenStreetMap Nominatim + OSRM)
// ============================================================================
// Everything below is designed to squeeze the most accuracy and reliability
// out of 100% free, keyless services: OSM Nominatim for geocoding/search,
// and the public OSRM demo server for real road-network routing. No paid
// API (Google/Mapbox/HERE/TomTom) is used anywhere in this app.

// Wraps fetch() with a hard timeout so a slow/overloaded free server can
// never hang the UI — critical on slow mobile connections. Aborts and
// throws instead of waiting indefinitely.
async function fetchWithTimeout(url, opts={}, timeoutMs=7000){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);
  try{
    return await fetch(url, Object.assign({}, opts, { signal: controller.signal }));
  } finally {
    clearTimeout(timer);
  }
}
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

// Simple TTL caches (in-memory, per session) so repeated identical lookups
// — re-typing the same place, re-selecting a recent destination, retrying
// after a network blip — don't re-hit the free Nominatim/OSRM servers.
// This both speeds up the app and is good citizenship on shared free
// infrastructure that has fair-use rate limits.
const GEOCODE_CACHE_TTL_MS = 10 * 60 * 1000; // 10 minutes
const ROUTE_CACHE_TTL_MS = 10 * 60 * 1000;
const _geocodeCache = new Map(); // normalized query -> { value, ts }
const _routeCache = new Map();   // "lat,lng,lat,lng" (rounded) -> { value, ts }
function cacheGet(map, key, ttlMs){
  const e = map.get(key);
  if(e && (Date.now() - e.ts) < ttlMs) return e.value;
  if(e) map.delete(key);
  return null;
}
function cacheSet(map, key, value){
  map.set(key, { value, ts: Date.now() });
  // Keep the cache small on long sessions — drop the oldest entry once we
  // pass a reasonable cap instead of growing unbounded.
  if(map.size > 200){ map.delete(map.keys().next().value); }
}
// Rough outer bounds of Ogun State, used as a cheap first-pass reject
// before running the more expensive per-zone haversine loop below.
const SERVICE_BOUNDS = { minLat:6.4, maxLat:7.6, minLng:2.5, maxLng:4.3 };
// Same box expressed as a Nominatim viewbox string: left,top,right,bottom (lng,lat)
const SERVICE_VIEWBOX = `${SERVICE_BOUNDS.minLng},${SERVICE_BOUNDS.maxLat},${SERVICE_BOUNDS.maxLng},${SERVICE_BOUNDS.minLat}`;

// Riders don't need to see the bureaucratic "LGA" tag in the address text —
// it's only meaningful internally for zone lookups and admin screens. This
// strips the word "LGA" (and the spelled-out "Local Government Area", in
// case a remote Nominatim result ever includes it) purely for display, e.g.
// "Abeokuta North LGA (Ogun)" -> "Abeokuta North (Ogun)". The underlying
// zone.name (used for matching, admin screens, etc.) is left completely
// untouched — this only affects what gets rendered in the address text.
function stripLGA(text){
  return (text || '')
    .replace(/\bLocal Government Area\b/gi, '')
    .replace(/\bLGA\b/gi, '')
    .replace(/\s*,\s*,/g, ',')      // collapse any double commas left behind
    .replace(/\s+/g, ' ')
    .replace(/\s+,/g, ',')
    .trim();
}
// Nominatim's display_name is the full address hierarchy: e.g.
// "Osiele, Obafemi Owode, Ogun State, Nigeria" or, for a house-number-level
// match, "5, Adigbe Street, Osiele, Obafemi Owode, Ogun State, Nigeria".
// Riders just want the specific place they typed — no LGA, no state, no
// country — but if they typed a street (or a house number on a street),
// that should still show. So: keep the first segment, and also keep the
// second segment when the first is just a bare house number.
function shortenPlaceLabel(displayName){
  const parts = (displayName || '').split(',').map(p=>p.trim()).filter(Boolean);
  if(!parts.length) return stripLGA(displayName);
  let short = /^\d+[a-zA-Z]?$/.test(parts[0]) && parts.length > 1
    ? parts[0] + ', ' + parts[1]
    : parts[0];
  return stripLGA(short);
}

// ---------- UNIFIED ADDRESS SEARCH (free Nominatim, cached, prioritized) ----------
// Single source of truth for turning what someone types into real
// candidate locations. Used by both the live-typing autocomplete dropdown
// and the "confirm this address" fallback when someone types and leaves
// the field without tapping a suggestion. Always returns an array (never
// auto-picks one) — callers decide what to do with 0, 1, or many results.
async function searchAddress(query){
  const key = (query || '').trim().toLowerCase();
  if(key.length < 2) return [];
  const cached = cacheGet(_geocodeCache, key, GEOCODE_CACHE_TTL_MS);
  if(cached) return cached;
  // Skip the network entirely when we already know we're offline — fail
  // fast instead of waiting out a doomed request on a slow connection.
  if(typeof navigator !== 'undefined' && navigator.onLine === false) return [];
  try{
    const q = encodeURIComponent(key + ', Nigeria');
    const url = `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=8&addressdetails=1&viewbox=${SERVICE_VIEWBOX}&bounded=0`;
    const res = await fetchWithTimeout(url, { headers:{'Accept-Language':'en'} }, 7000);
    if(!res.ok) return [];
    const data = await res.json();
    let results = (Array.isArray(data) ? data : []).map(d=>{
      const lat = parseFloat(d.lat), lng = parseFloat(d.lon);
      return {
        label: shortenPlaceLabel(d.display_name),
        lat, lng,
        // Prioritize results actually inside our Ogun State coverage —
        // Nominatim's viewbox is only a soft hint, so we re-rank
        // client-side to make sure in-state matches always surface first.
        inCoverage: isInServiceArea(lat, lng)
      };
    }).filter(r => isFinite(r.lat) && isFinite(r.lng));
    results.sort((a,b) => (b.inCoverage === a.inCoverage) ? 0 : (b.inCoverage ? 1 : -1));
    results = results.slice(0, 5); // top 5 only, per design — never more, never auto-picked
    cacheSet(_geocodeCache, key, results);
    return results;
  }catch(e){
    return []; // network error / timeout — caller falls back gracefully
  }
}
function isInServiceArea(lat,lng){
  if(lat==null || lng==null) return false;
  const b = SERVICE_BOUNDS;
  if(lat < b.minLat || lat > b.maxLat || lng < b.minLng || lng > b.maxLng) return false;
  return serviceZones.some(z => haversineKm(lat,lng,z.lat,z.lng) <= z.radiusKm);
}
// Cache the flattened keyword list per serviceZones array so repeated text
// lookups (e.g. while a passenger types) don't rebuild it on every keystroke.
let _zoneKeywordsCache = null, _zoneKeywordsCacheFor = null;
function getAllZoneKeywords(){
  if(_zoneKeywordsCacheFor !== serviceZones){
    _zoneKeywordsCache = serviceZones.flatMap(z => (z.areaKeywords || [z.name]).map(k=>k.toLowerCase()));
    _zoneKeywordsCacheFor = serviceZones;
  }
  return _zoneKeywordsCache;
}
// Fallback when exact coordinates aren't available — checks address text against all zone keywords.
function isLikelyInServiceArea(point){
  if(!point) return false;
  if(point.lat != null && point.lng != null) return isInServiceArea(point.lat, point.lng);
  const text = (point.address || '').toLowerCase();
  return getAllZoneKeywords().some(k => text.includes(k));
}
function todayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function computeFare(distanceKm){
  return computeFareBreakdown(distanceKm).total;
}

// ---------- COMMUTE PLAN (Ride Subscription) ----------
const COMMUTE_DAYS = [
  {key:'mon', label:'Mon'}, {key:'tue', label:'Tue'}, {key:'wed', label:'Wed'},
  {key:'thu', label:'Thu'}, {key:'fri', label:'Fri'}, {key:'sat', label:'Sat'}, {key:'sun', label:'Sun'}
];
const DEFAULT_COMMUTE_DISCOUNTS = { '1w':5, '2w':5, '1m':10, '3m':15, '6m':20, 'custom':0 };
let commuteDiscounts = Object.assign({}, DEFAULT_COMMUTE_DISCOUNTS);
function loadCommuteDiscounts(){
  return db.collection('settings').doc('commuteDiscounts').get().then(snap=>{
    commuteDiscounts = snap.exists ? Object.assign({}, DEFAULT_COMMUTE_DISCOUNTS, snap.data()) : DEFAULT_COMMUTE_DISCOUNTS;
    if(!snap.exists) db.collection('settings').doc('commuteDiscounts').set(DEFAULT_COMMUTE_DISCOUNTS).catch(()=>{});
  }).catch(()=>{ commuteDiscounts = Object.assign({}, DEFAULT_COMMUTE_DISCOUNTS); });
}
const COMMUTE_DURATIONS = {
  '1w':{ label:'1 Week', weeks:1 }, '2w':{ label:'2 Weeks', weeks:2 },
  '1m':{ label:'1 Month', weeks:4 }, '3m':{ label:'3 Months', weeks:13 },
  '6m':{ label:'6 Months', weeks:26 }, 'custom':{ label:'Custom', weeks:null }
};
function commuteDayKey(jsDay){ return ['sun','mon','tue','wed','thu','fri','sat'][jsDay]; }
function commuteLocalDateStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function commuteCountTripDays(startDate, endDate, daysOfWeek){
  let count = 0;
  const d = new Date(startDate); d.setHours(0,0,0,0);
  const end = new Date(endDate); end.setHours(0,0,0,0);
  while(d <= end){ if(daysOfWeek.includes(commuteDayKey(d.getDay()))) count++; d.setDate(d.getDate()+1); }
  return count;
}
// Full cost/discount estimate shown to the customer before they confirm a plan.
function commuteComputeEstimate({ distanceKm, returnDistanceKm, startDate, endDate, daysOfWeek, durationType }){
  const outboundFare = computeFare(distanceKm);
  const returnFare = returnDistanceKm != null ? computeFare(returnDistanceKm) : 0;
  const costPerDay = outboundFare + returnFare;
  const tripDays = commuteCountTripDays(startDate, endDate, daysOfWeek);
  const totalTrips = tripDays * (returnDistanceKm != null ? 2 : 1);
  const grossTotal = costPerDay * tripDays;
  const discountPct = commuteDiscounts[durationType] ?? 0;
  const totalPrice = Math.max(0, Math.round(grossTotal * (1 - discountPct/100)));
  return { costPerDay, tripDays, totalTrips, grossTotal, discountPct, totalPrice };
}
// Creates the subscription doc. Starts as 'pending_approval' — admin approves
// (and optionally assigns a dedicated rider) before automation begins.
async function commuteCreatePlan(d){
  const est = commuteComputeEstimate(d);
  const ref = await db.collection('commutePlans').add({
    customerId: currentUser.uid, customerName: currentUserDoc.name, customerPhone: currentUserDoc.phone||'',
    pickup: d.pickup, destination: d.destination, returnPickup: d.hasReturn ? d.destination : null,
    pickupTime: d.pickupTime, returnTime: d.hasReturn ? d.returnTime : null, hasReturn: !!d.hasReturn,
    daysOfWeek: d.daysOfWeek, startDate: d.startDate, endDate: d.endDate, durationType: d.durationType,
    distanceKm: d.distanceKm, returnDistanceKm: d.hasReturn ? d.returnDistanceKm : null,
    costPerTrip: est.costPerDay, tripDays: est.tripDays, totalTrips: est.totalTrips,
    discountPct: est.discountPct, totalPrice: est.totalPrice,
    paymentPlan: d.paymentPlan, paymentStatus: 'unpaid',
    status: 'pending_approval', assignedRiderId: null, assignedRiderName: null,
    pausedDates: [], skippedDates: [],
    createdAt: FieldValue.serverTimestamp()
  });
  await notifyUser(currentUser.uid, 'Scheduled Ride submitted', 'Your scheduled ride plan is awaiting admin approval. We\'ll notify you once it\'s active.');
  return ref.id;
}
// ---- Automation: generates real `rides` docs for the next few days ----
// No Cloud Functions yet, so this runs opportunistically whenever a
// customer, their assigned rider, or an admin has the app open — see
// commuteEnsureAllActivePlans(). Each due day gets a normal ride doc
// (tagged commutePlanId) so it flows through the existing accept/track/
// chat/pay/rate pipeline instead of a separate parallel system.
async function commuteEnsureUpcomingRides(planId, plan, horizonDays=7){
  if(plan.status !== 'active') return;
  const today = new Date(); today.setHours(0,0,0,0);
  const todayKey = commuteLocalDateStr(today);
  const planStart = new Date(plan.startDate); planStart.setHours(0,0,0,0);
  let planEnd = new Date(plan.endDate); planEnd.setHours(0,0,0,0);

  // Auto-renew: if the plan ends within 3 days and the customer opted in,
  // extend it by its original duration and recompute the price/trip count
  // for the new period, so it just keeps going without manual action.
  const daysToEnd = Math.round((planEnd - today) / 86400000);
  if(plan.autoRenew && daysToEnd >= 0 && daysToEnd <= 3){
    const weeks = (COMMUTE_DURATIONS[plan.durationType] || {}).weeks || 4;
    const newEnd = new Date(planEnd); newEnd.setDate(newEnd.getDate() + weeks*7);
    const newEndKey = commuteLocalDateStr(newEnd);
    const est = commuteComputeEstimate({
      distanceKm: plan.distanceKm, returnDistanceKm: plan.hasReturn ? plan.returnDistanceKm : null,
      startDate: plan.startDate, endDate: newEndKey, daysOfWeek: plan.daysOfWeek, durationType: plan.durationType
    });
    await db.collection('commutePlans').doc(planId).update({
      endDate: newEndKey, totalTrips: est.totalTrips, tripDays: est.tripDays, totalPrice: est.totalPrice, paymentStatus:'unpaid'
    });
    plan = Object.assign({}, plan, { endDate: newEndKey, totalTrips: est.totalTrips, totalPrice: est.totalPrice });
    planEnd = newEnd;
    await notifyUser(plan.customerId, 'Scheduled Ride renewed', `Your plan has been automatically renewed through ${newEndKey}. New total: ${fmtNaira(est.totalPrice)} — please complete payment in the app.`);
  }

  const start = planStart > today ? planStart : today;
  for(let i=0; i<horizonDays; i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    if(d > planEnd) break;
    const dateKey = commuteLocalDateStr(d);
    if(!plan.daysOfWeek.includes(commuteDayKey(d.getDay()))) continue;
    if((plan.pausedDates||[]).includes(dateKey) || (plan.skippedDates||[]).includes(dateKey)) continue;
    // Only TODAY's leg becomes a real, live-tracked `rides` doc. Future days
    // just get a lightweight placeholder so the schedule/calendar is
    // visible — otherwise a rider would see a ride 3 days away as if it
    // were their current active trip.
    const isToday = dateKey === todayKey;
    await commuteEnsureLeg(planId, plan, dateKey, 'outbound', isToday);
    if(plan.hasReturn) await commuteEnsureLeg(planId, plan, dateKey, 'return', isToday);
  }
}
async function commuteEnsureLeg(planId, plan, dateKey, leg, makeReal){
  // Deterministic doc ID (plan+date+leg) makes this naturally idempotent —
  // safe to call repeatedly from multiple devices without double-booking.
  const schedRef = db.collection('scheduledRides').doc(`${planId}_${dateKey}_${leg}`);
  const existing = await schedRef.get();
  if(existing.exists && (!makeReal || existing.data().rideId)) return; // already generated (or already a real ride)
  const pickup = leg==='outbound' ? plan.pickup : plan.returnPickup;
  const destination = leg==='outbound' ? plan.destination : plan.pickup;
  const distanceKm = leg==='outbound' ? plan.distanceKm : (plan.returnDistanceKm ?? plan.distanceKm);
  const pickupTime = leg==='outbound' ? plan.pickupTime : plan.returnTime;
  if(!makeReal){
    if(!existing.exists){
      await schedRef.set({
        planId, customerId: plan.customerId, riderId: plan.assignedRiderId||null,
        date: dateKey, leg, pickupTime, pickup, destination, status:'scheduled', rideId: null,
        createdAt: FieldValue.serverTimestamp()
      });
    }
    return;
  }
  const fare = computeFare(distanceKm);
  const rideRef = await db.collection('rides').add({
    passengerId: plan.customerId, passengerName: plan.customerName, passengerPhone: plan.customerPhone||'',
    riderId: plan.assignedRiderId || null, riderName: plan.assignedRiderName || null,
    pickup, destination, distanceKm, fare, fareIsEstimate:false,
    paymentMethod:'commute_plan', paymentStatus:'covered_by_plan',
    status: plan.assignedRiderId ? 'accepted' : 'searching',
    riderActive: !!plan.assignedRiderId, passengerActive:true, passengerRated:false,
    commutePlanId: planId, commuteLeg: leg, commuteDate: dateKey,
    createdAt: FieldValue.serverTimestamp()
  });
  await schedRef.set({
    planId, customerId: plan.customerId, riderId: plan.assignedRiderId||null,
    date: dateKey, leg, pickupTime, pickup, destination, status:'ride_created', rideId: rideRef.id,
    createdAt: FieldValue.serverTimestamp()
  });
  await notifyUser(plan.customerId, 'Commute ride scheduled', `Your ${leg==='outbound'?'pickup':'return'} ride for today at ${pickupTime} has been created.`);
}
// Call this whenever it's convenient (customer opening Commute tab, rider
// opening Scheduled Rides, admin opening Commute Plans) to top up the next
// 7 days of rides for whichever plans that viewer can see.
async function commuteEnsureForPlans(plans){
  for(const p of plans){

  }

function commuteStatusPillClass(status){

function commuteProgressPct(plan){
  const start = new Date(plan.startDate).getTime(), end = new Date(plan.endDate).getTime(), now = Date.now();

  if(now >= end) return 100;

}

// ---------- DISPATCH DELIVERY (send a package) ----------
const DELIVERY_CATEGORIES = [
  { key:'document', label:'📄 Document', sizeMultiplier:1 },
  { key:'food', label:'🍔 Food', sizeMultiplier:1.1 },
  { key:'electronics', label:'📱 Electronics', sizeMultiplier:1.3 },
  { key:'fragile', label:'🍶 Fragile', sizeMultiplier:1.4 },
  { key:'other', label:'📦 Other', sizeMultiplier:1.15 }
];
// Status flow: pending → accepted → heading_to_pickup → picked_up → in_transit → delivered
//                                                                  ↘ disputed / cancelled at any point before delivered
const DELIVERY_STATUS_LABELS = {
  pending:'Pending', accepted:'Rider assigned', heading_to_pickup:'Heading to pickup', picked_up:'Package picked up',
  in_transit:'On the way', delivered:'Delivered', cancelled:'Cancelled', disputed:'Disputed'
};
const DEFAULT_DELIVERY_PRICING = { baseFee:300, perKm:80, perKg:50, minFee:500 };
let deliveryPricing = Object.assign({}, DEFAULT_DELIVERY_PRICING);
function loadDeliveryPricing(){
  return db.collection('settings').doc('deliveryPricing').get().then(snap=>{
    deliveryPricing = snap.exists ? Object.assign({}, DEFAULT_DELIVERY_PRICING, snap.data()) : DEFAULT_DELIVERY_PRICING;
    if(!snap.exists) db.collection('settings').doc('deliveryPricing').set(DEFAULT_DELIVERY_PRICING).catch(()=>{});
  }).catch(()=>{ deliveryPricing = Object.assign({}, DEFAULT_DELIVERY_PRICING); });
}
function computeDeliveryFeeBreakdown(distanceKm, weightKg, categoryKey){
  const cat = DELIVERY_CATEGORIES.find(c=>c.key===categoryKey) || DELIVERY_CATEGORIES[4];
  const baseFee = deliveryPricing.baseFee;
  const distanceCharge = distanceKm * deliveryPricing.perKm;
  const weightCharge = (weightKg||1) * deliveryPricing.perKg;
  const subtotal = baseFee + distanceCharge + weightCharge;
  const categorySurcharge = (subtotal * cat.sizeMultiplier) - subtotal; // extra amount added by the category multiplier
  const rawTotal = subtotal + categorySurcharge;
  const total = Math.max(deliveryPricing.minFee, Math.round(rawTotal));
  const minFeeTopUp = total - Math.round(rawTotal); // >0 only when the minimum fee kicked in
  return { baseFee, distanceCharge, weightCharge, categorySurcharge, minFeeTopUp, total, categoryLabel: cat.label };
}
function computeDeliveryFee(distanceKm, weightKg, categoryKey){
  return computeDeliveryFeeBreakdown(distanceKm, weightKg, categoryKey).total;
}
function deliveryStatusPillClass(status){
  return { pending:'pill-amber', accepted:'pill-amber', heading_to_pickup:'pill-amber', picked_up:'pill-amber',
    in_transit:'pill-amber', delivered:'pill-green', cancelled:'pill-red', disputed:'pill-red' }[status] || 'pill-grey';
}
async function dispatchCreateDelivery(d){
  const b = computeDeliveryFeeBreakdown(d.distanceKm, d.weightKg, d.category);
  const fee = b.total;
  const ref = await db.collection('deliveries').add({
    customerId: currentUser.uid, customerName: currentUserDoc.name,
    senderName: d.senderName, senderPhone: d.senderPhone,
    recipientName: d.recipientName, recipientPhone: d.recipientPhone,
    pickup: d.pickup, dropoff: d.dropoff, stops: d.stops || [],
    packageDescription: d.packageDescription, category: d.category, weightKg: d.weightKg,
    distanceKm: d.distanceKm, fee, feeBreakdown: b, paymentMethod: d.paymentMethod,
    paymentStatus: d.paymentMethod==='cash' ? 'pay_on_delivery' : 'unpaid',
    scheduleType: d.scheduleType, scheduledFor: d.scheduleType==='scheduled' ? d.scheduledFor : null,
    status:'pending', riderId:null, riderName:null,
    proofOfDeliveryDataUrl:null, customerRated:false,
    createdAt: FieldValue.serverTimestamp()
  });
  if(d.paymentMethod==='wallet'){
    await debitWallet(currentUser.uid, fee, `Package delivery — ${d.pickup.address} → ${d.dropoff.address}`, { deliveryId: ref.id });
    await ref.update({ paymentStatus:'paid' });
  }
  await notifyUser(currentUser.uid, 'Delivery request sent', 'We\'re finding a rider for your package. You\'ll be notified once one accepts.');
  return ref.id;
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function computeFareBreakdown(distanceKm, durationMin){
  const r = fareRules;
  const estMinutes = (durationMin != null) ? durationMin : distanceKm * 3.2;
  const distCharge = distanceKm * r.perKm;
  const timeCharge = estMinutes * r.perMin;
  let total = r.baseFare + distCharge + timeCharge;
  total = Math.max(total, r.minFare);
  total = Math.round(total/10)*10;
  return { base: Math.round(r.baseFare), distCharge: Math.round(distCharge), timeCharge: Math.round(timeCharge), total, estMinutes: Math.round(estMinutes) };
}

}

  if(mapsLoaded) return Promise.resolve(true);
  if(mapsLoadingPromise) return mapsLoadingPromise;
  mapsLoadingPromise = new Promise((resolve)=>{
    window.__zrMapsReady = () => { mapsLoaded = true; resolve(true); };
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&libraries=places&callback=__zrMapsReady`;
    s.async = true;
    s.onerror = () => resolve(false);

}

// Fallback position for a zone keyword that has no curated entry above —
// used for any area name an admin adds themselves in the Service Areas
// screen. Without this, every custom keyword added to the same zone
// resolved to that zone's exact center point, so two different custom
// areas in one zone (e.g. two names added to the same zone) looked like
// the identical coordinate. That collapsed pickup/destination onto one
// point, which made the free routing service reject the (zero-length)
// route and silently fall back to the "road route unavailable" straight-
// line estimate seen when picking two such areas. Spreading each keyword
// to its own deterministic point within the zone (same keyword always
// lands on the same spot) keeps areas distinguishable and routable.
function keywordFallbackPosition(kLower, z){
  let hash = 0;
  for(let i=0;i<kLower.length;i++){ hash = ((hash<<5) - hash + kLower.charCodeAt(i)) | 0; }
  const angle = (Math.abs(hash) % 360) * (Math.PI/180);
  const spreadKm = (z.radiusKm || 5) * 0.55; // stay well within the zone
  const dLat = (spreadKm/111) * Math.cos(angle);
  const dLng = (spreadKm/(111 * Math.cos(z.lat * Math.PI/180))) * Math.sin(angle);
  return { lat: z.lat + dLat, lng: z.lng + dLng };
}

// ---------- FREE ADDRESS AUTOCOMPLETE (no API key, no subscription) ----------
// Two layers, both free:
//  1. Instant local matches against the LGA/locality names already built
//     into serviceZones — zero network cost, works offline, and always
//     covers every LGA in Ogun State.
//  2. A debounced lookup against the free OpenStreetMap Nominatim search
//     API (no key, no billing) for real street-level address suggestions,
//     biased to the Ogun State bounding box.
// This works standalone (MAPS_API_KEY empty) and alongside the optional
// Google Places autocomplete above if a key is ever added later.
function attachFreeAutocomplete(inputEl, onSelect){
  if(!inputEl) return;
  const wrap = inputEl.closest('.field') || inputEl.parentElement;
  if(!wrap) return;
  wrap.style.position = wrap.style.position || 'relative';
  const list = document.createElement('div');
  list.className = 'zr-suggest-list hidden';
  wrap.appendChild(list);

  let debounceTimer = null;
  let activeQuery = '';

  function hideList(){ list.classList.add('hidden'); list.innerHTML = ''; }

  function selectItem(it){
    onSelect({ lat: it.lat, lng: it.lng, address: it.label });
    inputEl.value = it.label;
    hideList();
  }

  function renderSuggestions(items){
    if(!items.length){ hideList(); return; }
    list.innerHTML = items.map((it,i)=>
      `<button type="button" class="zr-suggest-item" data-idx="${i}">
        <span class="zr-suggest-tag">${it.tag}</span>
        <span class="zr-suggest-text">${it.label}</span>
      </button>`
    ).join('');
    list.classList.remove('hidden');
    list.querySelectorAll('.zr-suggest-item').forEach(btn=>{
      btn.addEventListener('mousedown', (e)=>{ // mousedown fires before input blur
        e.preventDefault();
        selectItem(items[parseInt(btn.dataset.idx)]);
      });
    });
  }

  function localMatches(query){
    const q = query.toLowerCase().trim();
    const seen = new Set();
    const out = [];
    for(const z of serviceZones){
      const kws = (z.areaKeywords && z.areaKeywords.length) ? z.areaKeywords : [z.name];
      for(const k of kws){
        const kLower = k.toLowerCase();
        let label = null;
        if(kLower.startsWith(q)){
          // Still typing the place name itself — suggest the clean place name.
          label = k.replace(/\b\w/g, c=>c.toUpperCase());
        } else if(q.length > kLower.length && q.includes(kLower)){
          // A fuller address (house number/street) with a known place name
          // somewhere inside it — keep what was actually typed instead of
          // throwing away the house number/street details.
          label = query.replace(/\b\w/g, c=>c.toUpperCase());
        }
        if(label && !seen.has(label.toLowerCase())){
          seen.add(label.toLowerCase());
          const pos = LOCALITY_POSITIONS[kLower] || keywordFallbackPosition(kLower, z);
          out.push({ label, lat:pos.lat, lng:pos.lng, tag:'LGA' });
        }
        if(out.length >= 5) break;
      }
      if(out.length >= 5) break;
    }
    return out;
  }

  // Remote suggestions reuse the single shared searchAddress() function —
  // same cache, same timeout handling, same Ogun State prioritization as
  // every other place in the app that geocodes an address, so behavior
  // (and the top-5 cap) stays consistent everywhere.
  async function remoteMatches(query, localLabels){
    const results = await searchAddress(query);
    const mapped = results.map(r => ({ label:stripLGA(r.label), lat:r.lat, lng:r.lng, tag: r.inCoverage ? 'MAP' : 'FAR' }));
    // Drop remote results that are really the same place as a local match
    // we already have a precise, curated point for — a generic Nominatim
    // LGA-boundary centroid can sit several km away from our curated
    // locality point even though it's "the same place", which previously
    // made close-by locations look far apart.
    if(!localLabels || !localLabels.length) return mapped;
    return mapped.filter(r=>{
      const rLower = r.label.toLowerCase();
      return !localLabels.some(l => rLower.includes(l));
    });
  }

  inputEl.addEventListener('input', ()=>{
    const query = inputEl.value.trim();
    activeQuery = query;
    if(query.length < 2){ hideList(); return; }
    // Instant, free, local suggestions first — no waiting on network.
    const firstPassLocal = localMatches(query).slice(0,5);
    renderSuggestions(firstPassLocal);
    // Then debounce a free Nominatim lookup for real addresses.
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async ()=>{
      if(inputEl.value.trim() !== query) return; // stale
      const local = localMatches(query);
      const localCoreLabels = local.map(l => l.label.split(',')[0].toLowerCase());
      const remote = await remoteMatches(query, localCoreLabels);
      if(activeQuery !== query) return; // user kept typing
      // Top 5 total, local (curated/precise) results given priority over
      // generic map results when both exist for the same query.
      renderSuggestions([...local, ...remote].slice(0,5));
    }, 450);
  });
  inputEl.addEventListener('blur', ()=> setTimeout(hideList, 150));
  inputEl.addEventListener('focus', ()=>{ if(inputEl.value.trim().length >= 2) renderSuggestions(localMatches(inputEl.value.trim()).slice(0,5)); });

  // Lets other code (the fare pipeline) force this exact dropdown open
  // with a specific set of candidates when an address is ambiguous —
  // keeps "let the user choose" consistent everywhere, not just while
  // actively typing.
  inputEl._zrForceSuggestions = (options)=>{
    renderSuggestions(options.map(o => ({ label:o.label, lat:o.lat, lng:o.lng, tag: o.inCoverage ? 'MAP' : 'FAR' })));
  };
}

// Bump this whenever DEFAULT_SERVICE_ZONES meaningfully changes (e.g. this
// app used to ship with only 2 zones — Ikeja & Kosofe — restricting rides
// to those two LGAs, then later expanded to all of Lagos + Ogun, and is
// now scoped to Ogun State only). Existing deployments already have a
// `serviceZones` document saved in Firestore from before each of these
// changes, and without a version check that OLD zone list would keep
// overriding the new one forever. Any zones doc saved with an older (or
// missing) version gets auto-upgraded to the current Ogun State coverage
// the next time the app loads. Admin edits made *after* the upgrade are
// stamped with the current version, so they're never clobbered by this
// migration.
const SERVICE_ZONES_VERSION = 3;

// ---------- SETTINGS (fare rules + service area) ----------
let _generalSettingsListenerAttached = false;
function loadSettings(){
  return Promise.all([
    db.collection('settings').doc('fareRules').get(),
    db.collection('settings').doc('serviceZones').get(),
    db.collection('settings').doc('referral').get(),
    db.collection('settings').doc('general').get()
  ]).then(([fr, sz, rf, gs])=>{
    fareRules = fr.exists ? Object.assign({}, DEFAULT_FARE_RULES, fr.data()) : DEFAULT_FARE_RULES;
    if(!fr.exists) db.collection('settings').doc('fareRules').set(DEFAULT_FARE_RULES).catch(()=>{});
    const savedZonesDoc = sz.exists ? sz.data() : null;
    const savedZonesStale = !savedZonesDoc || !(savedZonesDoc.zonesVersion >= SERVICE_ZONES_VERSION);
    if(savedZonesDoc && savedZonesDoc.zones && savedZonesDoc.zones.length && !savedZonesStale){
      serviceZones = savedZonesDoc.zones;
    } else {
      // No saved zones yet, OR the saved zones predate this coverage
      // upgrade (e.g. the old Ikeja & Kosofe-only config) — migrate to
      // the full Ogun State zone list and persist the new version.
      serviceZones = DEFAULT_SERVICE_ZONES.map(z=>Object.assign({},z));
      db.collection('settings').doc('serviceZones').set({ zones: DEFAULT_SERVICE_ZONES, zonesVersion: SERVICE_ZONES_VERSION }).catch(()=>{});
    }
    serviceArea = {
      name: 'Ogun State',
      areaKeywords: serviceZones.flatMap(z=>z.areaKeywords||[z.name]),
      lat: serviceZones[0].lat, lng: serviceZones[0].lng, radiusKm: serviceZones[0].radiusKm
    };
    referralSettings = rf.exists ? Object.assign({}, DEFAULT_REFERRAL_SETTINGS, rf.data()) : DEFAULT_REFERRAL_SETTINGS;
    if(!rf.exists) db.collection('settings').doc('referral').set(DEFAULT_REFERRAL_SETTINGS).catch(()=>{});
    generalSettings = gs.exists ? Object.assign({}, DEFAULT_GENERAL_SETTINGS, gs.data()) : DEFAULT_GENERAL_SETTINGS;
    if(!gs.exists) db.collection('settings').doc('general').set(DEFAULT_GENERAL_SETTINGS).catch(()=>{});
    if(!_generalSettingsListenerAttached){
      _generalSettingsListenerAttached = true;
      db.collection('settings').doc('general').onSnapshot(snap=>{
        if(snap.exists){
          generalSettings = Object.assign({}, DEFAULT_GENERAL_SETTINGS, snap.data());
          renderSupportPhoneEverywhere();
        }
      });
    }
  }).catch(()=>{
    fareRules = DEFAULT_FARE_RULES;
    serviceZones = DEFAULT_SERVICE_ZONES.map(z=>Object.assign({},z));
    serviceArea = { name:'Ogun State', areaKeywords: DEFAULT_SERVICE_ZONES.flatMap(z=>z.areaKeywords||[]), lat:DEFAULT_SERVICE_ZONES[0].lat, lng:DEFAULT_SERVICE_ZONES[0].lng, radiusKm:DEFAULT_SERVICE_ZONES[0].radiusKm };
    referralSettings = Object.assign({}, DEFAULT_REFERRAL_SETTINGS);
    generalSettings = Object.assign({}, DEFAULT_GENERAL_SETTINGS);
  });
}

// ---- Public delivery tracking (no login required) ----
// Uses a plain get-by-ID Firestore rule (not list), so knowing the random
// delivery ID acts like a bearer token — the same pattern as "anyone with
// the link" sharing. See the `allow get: if true;` rule for /deliveries.
(function checkPublicTrackingLink(){
  const params = new URLSearchParams(location.search);
  const trackId = params.get('track');
  if(!trackId) return;
  window.__zrTrackingMode = true;
  document.body.innerHTML = `<div class="auth-screen" style="padding:20px;justify-content:flex-start;">
    <div class="row" style="margin-bottom:16px;"><div class="brand-mark">Z</div><strong class="brand-name" style="margin-left:8px;">Z<span class="accent">Rider</span></strong></div>
    <h3>Tracking your delivery</h3>
    <div id="track-body" style="margin-top:14px;"><div class="skel" style="height:100px;"></div></div>
  </div>`;
  const render = async ()=>{
    try{
      const snap = await db.collection('deliveries').doc(trackId).get();
      const box = document.getElementById('track-body');
      if(!box) return;
      if(!snap.exists){ box.innerHTML = '<p class="muted">This tracking link is no longer valid.</p>'; return; }
      const d = snap.data();
      const stepOrder = ['pending','accepted','heading_to_pickup','picked_up','in_transit','delivered'];
      const curIdx = ['disputed','cancelled'].includes(d.status) ? -1 : stepOrder.indexOf(d.status);
      box.innerHTML = `
        <div class="card">
          <span class="pill ${deliveryStatusPillClass(d.status)}">${DELIVERY_STATUS_LABELS[d.status]||d.status}</span>
          <p style="margin-top:12px;font-size:14px;">${escapeHtml(d.pickup.address)} → ${escapeHtml(d.dropoff.address)}</p>
          <p class="muted" style="font-size:12px;margin-top:4px;">${escapeHtml(d.packageDescription||'')}</p>
          ${curIdx>=0?`<div class="row" style="margin-top:16px;">${stepOrder.map((s,i)=>`
            <div style="flex:1;text-align:center;"><div style="width:20px;height:20px;border-radius:50%;margin:0 auto;background:${i<=curIdx?'var(--amber-500)':'var(--surface-2)'};"></div>
            <p style="font-size:8px;margin-top:4px;color:${i<=curIdx?'var(--ink-900)':'var(--ink-400)'};">${DELIVERY_STATUS_LABELS[s]}</p></div>`).join('')}</div>`:''}
          ${d.riderName?`<p class="muted" style="font-size:12px;margin-top:14px;">Rider: ${escapeHtml(d.riderName)}</p>`:''}
        </div>
        <p class="muted" style="font-size:11px;margin-top:14px;text-align:center;">Powered by ZRider — no account needed to view this page.</p>`;
    }catch(e){
      const box = document.getElementById('track-body');
      if(box) box.innerHTML = '<p class="muted">Could not load tracking info.</p>';
    }
  };
  // Firestore isn't initialized yet at this exact point in the file, so
  // defer the first render slightly and then poll for live updates.
  setTimeout(()=>{ render(); setInterval(render, 15000); }, 300);
})();

async function routeUser(user){
  let ref = db.collection('users').doc(user.uid);
  let snap;
  try { snap = await ref.get(); } catch(e){ toast('Connection error. Retrying…','err'); setTimeout(()=>routeUser(user),1500); return; }

  if(!snap.exists){
    // Safety net: doc wasn't created (e.g. race condition) — create a minimal one now.
    const fallbackData = {
      name: user.displayName || user.email.split('@')[0],
      email: user.email, phone:'', role: pendingRequestRoleHint || 'passenger',
      rating:5, ratingCount:0, photoURL:'', createdAt: FieldValue.serverTimestamp()
    };
    await ref.set(fallbackData);
    snap = await ref.get();
  }

  let data = snap.data();

  if(data.suspended){
    await auth.signOut();
    toast('Your account has been suspended. Contact Zrider support.', 'err');
    renderAuth();
    return;
  }

  const isAdminEmail = user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  if(isAdminEmail && data.role !== 'admin'){
    await ref.update({ role:'admin' });
    data.role = 'admin';
  }
  currentUserDoc = data;
  currentRole = data.role;

  if(currentRole === 'admin' || currentRole === 'support'){ renderAdminApp(); return; }

  if(currentRole === 'rider'){
    const rsnap = await db.collection('riders').doc(user.uid).get();
    riderDoc = rsnap.exists ? rsnap.data() : null;
    if(!riderDoc){
      await db.collection('riders').doc(user.uid).set({ status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0, createdAt: FieldValue.serverTimestamp() });
      riderDoc = { status:'incomplete', online:false, walletBalance:0, totalEarned:0, totalTrips:0 };
    }
    // "Today's earnings/trips" were only ever incremented, never reset, so
    // they silently became a running lifetime total instead of resetting
    // each day. If the stored date isn't today, zero them out here.
    if(riderDoc.todayDate !== todayKey()){
      riderDoc.todayEarnings = 0; riderDoc.todayTrips = 0; riderDoc.todayDate = todayKey();
      db.collection('riders').doc(user.uid).update({ todayEarnings:0, todayTrips:0, todayDate: todayKey() }).catch(()=>{});
    }
    if(riderDoc.status === 'incomplete') renderRiderGate('onboard');
    else if(riderDoc.status === 'pending') renderRiderGate('pending');
    else if(riderDoc.status === 'rejected') renderRiderGate('rejected');
    else renderRiderApp();
    return;
  }

  renderPassengerApp();
}

function friendlyAuthError(e){
  const code = e && e.code || '';
  if(code.includes('email-already-in-use')) return 'That email is already registered. Try logging in.';
  if(code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
  if(code.includes('user-not-found')) return 'No account found with that email.';
  if(code.includes('invalid-email')) return 'That email address looks invalid.';
  if(code.includes('weak-password')) return 'Choose a stronger password (min. 6 characters).';
  if(code.includes('network')) return 'Network error — check your connection and try again.';
  return e && e.message ? e.message : 'Something went wrong. Please try again.';
}

// Compress + resize an image file in-browser and return a base64 data URL,
// small enough to store directly inside a Firestore document (1MB doc limit).
function fileToCompressedDataURL(file, maxDim, startQuality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = () => reject(new Error('Could not read image.'));
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let q = startQuality || 0.7;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        // Step quality down until the encoded string comfortably fits in a Firestore field.
        while(dataUrl.length > 320000 && q > 0.25){
          q -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', q);
        }
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================== WALLET & REFERRAL HELPERS ==============================
function generateReferralCode(uid){
  return 'ZR' + uid.substring(0,6).toUpperCase();
}
async function ensureWallet(uid){
  const ref = db.collection('wallets').doc(uid);
  const snap = await ref.get();
  if(!snap.exists){ await ref.set({ balance:0, updatedAt: FieldValue.serverTimestamp() }); return 0; }
  return snap.data().balance || 0;
}
async function getWalletBalance(uid){
  try{
    const snap = await db.collection('wallets').doc(uid).get();
    return snap.exists ? (snap.data().balance || 0) : 0;
  }catch(e){ return 0; }
}
async function creditWallet(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    tx.set(ref, { balance: cur + amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'credit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
}
async function debitWallet(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  let ok = false;
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    if(cur < amount) throw new Error('Insufficient wallet balance');
    tx.set(ref, { balance: cur - amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
    ok = true;
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'debit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
  return ok;
}
// Charges the platform's commission share on a cash trip. Unlike
// debitWallet, this always succeeds and allows the balance to go negative
// — the commission is owed to the platform regardless of whether the
// rider's wallet currently covers it (the rider physically already holds
// the cash fare, so this isn't optional).
async function chargeCashCommission(uid, amount, description, meta={}){
  const ref = db.collection('wallets').doc(uid);
  await db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().balance||0) : 0;
    tx.set(ref, { balance: cur - amount, updatedAt: FieldValue.serverTimestamp() }, { merge:true });
  });
  await db.collection('wallets').doc(uid).collection('transactions').add({
    type:'debit', amount, description, ...meta, createdAt: FieldValue.serverTimestamp()
  });
}
async function checkAndAwardReferral(passengerId){
  try{
    const usnap = await db.collection('users').doc(passengerId).get();
    if(!usnap.exists) return;
    const ud = usnap.data();
    if(!ud.referredBy || !referralSettings.enabled || referralSettings.condition !== 'first_trip') return;
    const refSnap = await db.collection('referrals')
      .where('refereeId','==',passengerId).where('status','==','rewarded').limit(1).get();
    if(!refSnap.empty) return; // already awarded
    const pendSnap = await db.collection('referrals')
      .where('refereeId','==',passengerId).where('status','==','pending').limit(1).get();
    if(pendSnap.empty) return;
    const refDoc = pendSnap.docs[0];
    if(referralSettings.autoApprove){
      await db.collection('referrals').doc(refDoc.id).update({ status:'rewarded', awardedAt: FieldValue.serverTimestamp() });
      await creditWallet(ud.referredBy, referralSettings.rewardAmount, `Referral reward — ${ud.name} completed first trip`, { referralId: refDoc.id });
      await notifyUser(ud.referredBy, '🎉 Referral reward received!', `${ud.name} completed their first trip. ₦${referralSettings.rewardAmount} added to your wallet!`);
    } else {
      await db.collection('referrals').doc(refDoc.id).update({ status:'pending_approval' });
      await notifyUser(ADMIN_EMAIL, 'Referral pending approval', `${ud.name} completed first trip. Referral for user ${ud.referredBy}.`);
    }
  }catch(e){ console.warn('referral award error', e); }
}

// Best-effort "30 minutes before pickup" reminder — since there's no
// backend cron yet, this only fires while the passenger has the app open
// (checked on load and every 5 minutes). Once Cloud Functions are wired up,
// this same notifyUser call should move server-side for full reliability.
let commuteReminderTimer = null;
async function commuteCheckReminders(){
  if(!currentUser || currentRole !== 'passenger') return;
  try{
    const todayKey = commuteLocalDateStr(new Date());
    const snap = await db.collection('rides')
      .where('passengerId','==', currentUser.uid)
      .where('commuteDate','==', todayKey)
      .get();
    const now = new Date();
    for(const doc of snap.docs){
      const r = doc.data();
      if(!['accepted','searching'].includes(r.status) || r.reminderSent) continue;
      const pickupTime = r.commuteLeg === 'return' ? null : null; // pickupTime not stored on ride; derive from scheduledRides
      const schedSnap = await db.collection('scheduledRides').doc(`${r.commutePlanId}_${todayKey}_${r.commuteLeg}`).get();
      if(!schedSnap.exists || !schedSnap.data().pickupTime) continue;
      const [hh, mm] = schedSnap.data().pickupTime.split(':').map(Number);
      const pickupAt = new Date(now); pickupAt.setHours(hh, mm, 0, 0);
      const minutesUntil = (pickupAt - now) / 60000;
      if(minutesUntil > 0 && minutesUntil <= 30){
        await notifyUser(currentUser.uid, 'Upcoming pickup', `Your ${r.commuteLeg==='outbound'?'pickup':'return pickup'} is in about ${Math.round(minutesUntil)} minutes at ${schedSnap.data().pickupTime}.`);
        await doc.ref.update({ reminderSent: true });
      }
    }
  }catch(e){ /* best-effort — silently skip on failure */ }
}
