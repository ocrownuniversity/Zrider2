    $('a-an-today-revenue').textContent = fmtNaira(todaysCompleted.reduce((s,r)=>s+(r.fare||0),0));

    // Range window (for avg fare / cancellation rate / charts)
    const rangeStart = new Date(); rangeStart.setDate(rangeStart.getDate() - (aAnalyticsRange - 1)); rangeStart.setHours(0,0,0,0);
    const inRange = (r) => { const t = r.completedAt?.toDate?.() || r.createdAt?.toDate?.(); return t && t >= rangeStart; };
    const completedInRange = completed.filter(inRange);
    const cancelledInRange = cancelled.filter(inRange);
    const allInRange = rides.filter(inRange);

    $('a-an-avg-fare').textContent = completedInRange.length
      ? fmtNaira(Math.round(completedInRange.reduce((s,r)=>s+(r.fare||0),0) / completedInRange.length))
      : '₦0';
    const totalDecided = completedInRange.length + cancelledInRange.length;
    $('a-an-cancel-rate').textContent = totalDecided ? Math.round((cancelledInRange.length/totalDecided)*100) + '%' : '0%';

    $('a-an-rides-label').textContent = `RIDES PER DAY · LAST ${aAnalyticsRange} DAYS`;
    $('a-an-revenue-label').textContent = `REVENUE PER DAY · LAST ${aAnalyticsRange} DAYS`;
    renderDayChart('a-chart-rides', completedInRange, aAnalyticsRange, ()=>1);
    renderDayChart('a-chart-revenue', completedInRange, aAnalyticsRange, r=>r.fare||0, v=>'₦'+Math.round(v/1000)+'k');

    // Status breakdown for the selected range
    const statuses = ['completed','cancelled','ongoing','accepted','searching'];
    const counts = statuses.map(s => allInRange.filter(r=>r.status===s).length);
    const maxCount = Math.max(1, ...counts);
    const colors = { completed:'var(--green-100)', cancelled:'var(--red-600)', ongoing:'var(--amber-500)', accepted:'var(--amber-500)', searching:'var(--ink-400)' };
    $('a-status-breakdown').innerHTML = statuses.map((s,i)=>`
      <div style="margin-bottom:10px;">
        <div class="row" style="font-size:12px;margin-bottom:4px;"><span class="muted" style="text-transform:capitalize;">${s}</span><span>${counts[i]}</span></div>
        <div style="background:var(--surface-2);border-radius:6px;height:8px;overflow:hidden;">
          <div style="width:${(counts[i]/maxCount)*100}%;height:100%;background:${colors[s]};"></div>
        </div>
      </div>`).join('');

    // Demand by zone — which service zone each pickup was nearest to, ranked
    const zoneCounts = serviceZones.map(z=>({ name:z.name, count:0 }));
    allInRange.forEach(r=>{
      if(!r.pickup || r.pickup.lat == null) return;
      let nearest = null, nearestDist = Infinity;
      serviceZones.forEach((z,i)=>{
        const d = haversineKm(r.pickup.lat, r.pickup.lng, z.lat, z.lng);
        if(d < nearestDist){ nearestDist = d; nearest = i; }
      });
      if(nearest != null) zoneCounts[nearest].count++;
    });
    const rankedZones = zoneCounts.filter(z=>z.count>0).sort((a,b)=>b.count-a.count).slice(0,8);
    const maxZoneCount = Math.max(1, ...rankedZones.map(z=>z.count));
    $('a-demand-zones').innerHTML = rankedZones.length ? rankedZones.map((z,i)=>`
      <div style="margin-bottom:10px;">
        <div class="row" style="font-size:12px;margin-bottom:4px;"><span>${i+1}. ${escapeHtml(z.name)}</span><span class="muted">${z.count} rides</span></div>
        <div style="background:var(--surface-2);border-radius:6px;height:8px;overflow:hidden;">
          <div style="width:${(z.count/maxZoneCount)*100}%;height:100%;background:var(--amber-500);"></div>
        </div>
      </div>`).join('') : '<p class="muted" style="font-size:12px;">No pickups in this range yet.</p>';
  }catch(e){ toast('Could not load analytics data.', 'err'); }
}

// ---- Shared: Unique Rider ID generation ----
// Uses a counter document + transaction so IDs are guaranteed unique even
// if two riders were somehow approved at the exact same moment — a random
// ID with a "check then set" approach can't make that same guarantee.
async function generateUniqueRiderCode(){
  const counterRef = db.collection('settings').doc('riderCodeCounter');
  const next = await db.runTransaction(async (tx)=>{
    const snap = await tx.get(counterRef);
    const current = snap.exists ? (snap.data().value || 10000) : 10000;
    const nextVal = current + 1;
    tx.set(counterRef, { value: nextVal }, { merge:true });
    return nextVal;
  });
  return 'ZR' + next;
}

      if(r.bikeDocURL) el.querySelector('.view-bike-doc').addEventListener('click', ()=> openImageLightbox(r.bikeDocURL));
      // Backfill: any already-approved rider from before this feature existed
      // won't have a riderCode yet — assign one silently the next time an
      // admin views the Riders list, so nobody is left without an ID.
      if(r.status === 'approved' && !r.riderCode){
        generateUniqueRiderCode().then(code=>{
          db.collection('riders').doc(r.uid).update({ riderCode: code }).catch(()=>{});
        });
      }
      const actions = el.querySelector('[data-actions]');
      if(r.status === 'pending'){
        const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.textContent='Approve';
        approveBtn.addEventListener('click', async ()=>{
          const riderCode = r.riderCode || await generateUniqueRiderCode();
          await db.collection('riders').doc(r.uid).update({status:'approved', riderCode});
          await notifyUser(r.uid,"You're approved!",`You can now go online and start accepting rides on Zrider. Your Rider ID is ${riderCode} — share it with users who ask to verify you.`);
          toast('Rider approved.', 'ok'); aLoadRidersList();
        });
        const rejectBtn = document.createElement('button'); rejectBtn.className='btn btn-outline btn-sm'; rejectBtn.style.color='var(--red-600)'; rejectBtn.style.borderColor='var(--red-600)'; rejectBtn.textContent='Reject';
        rejectBtn.addEventListener('click', async ()=>{
          const reason = prompt('Reason for rejection (shown to the rider):') || 'Documents could not be verified.';
          await db.collection('riders').doc(r.uid).update({status:'rejected', rejectionReason:reason});
          await notifyUser(r.uid,'Application not approved', reason);
          toast('Rider rejected.'); aLoadRidersList();
        });
        actions.append(approveBtn, rejectBtn);
      } else if(r.status === 'approved'){
        const suspendBtn = document.createElement('button'); suspendBtn.className='btn btn-outline btn-sm'; suspendBtn.style.color='var(--red-600)'; suspendBtn.style.borderColor='var(--red-600)'; suspendBtn.textContent='Suspend';
        suspendBtn.addEventListener('click', async ()=>{ await db.collection('riders').doc(r.uid).update({status:'rejected', rejectionReason:'Suspended by admin.', online:false}); toast('Rider suspended.'); aLoadRidersList(); });
        actions.append(suspendBtn);
      } else if(r.status === 'rejected'){
        const reinstateBtn = document.createElement('button'); reinstateBtn.className='btn btn-primary btn-sm'; reinstateBtn.textContent='Reinstate';
        reinstateBtn.addEventListener('click', async ()=>{ await db.collection('riders').doc(r.uid).update({status:'approved'}); toast('Rider reinstated.', 'ok'); aLoadRidersList(); });
        actions.append(reinstateBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML = `<div class="empty-state"><p>Couldn't load riders.</p></div>`; }
}

// ---- Pricing ----
function aRenderPricing(){
  const c = $('a-screen-pricing'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-pricing'));
  $('a-price-base').value = fareRules.baseFare;
  $('a-price-perkm').value = fareRules.perKm;
  $('a-price-permin').value = fareRules.perMin;
  $('a-price-min').value = fareRules.minFare;
  $('a-save-pricing').addEventListener('click', async ()=>{
    const updated = Object.assign({}, fareRules, {
      baseFare: parseFloat($('a-price-base').value)||0,
      perKm: parseFloat($('a-price-perkm').value)||0,
      perMin: parseFloat($('a-price-permin').value)||0,
      minFare: parseFloat($('a-price-min').value)||0
    });
    await db.collection('settings').doc('fareRules').set(updated);
    fareRules = updated;
    toast('Pricing rules saved.', 'ok');
  });

  // ---- Rider & company split (rider % / company % always sum to 100) ----
  const riderInput = $('a-split-rider');
  const companyInput = $('a-split-company');
  const preview = $('a-split-preview');
  const companyPct = fareRules.commissionPct != null ? fareRules.commissionPct : 15;
  riderInput.value = Math.round((100 - companyPct)*10)/10;
  companyInput.value = Math.round(companyPct*10)/10;

  function updatePreview(){
    const companyPctNow = parseFloat(companyInput.value) || 0;
    const riderShare = Math.round(1000 * (100 - companyPctNow) / 100);
    const companyShare = 1000 - riderShare;
    preview.textContent = `Rider keeps ₦${riderShare.toLocaleString()} · Company keeps ₦${companyShare.toLocaleString()}`;
  }
  riderInput.addEventListener('input', ()=>{
    let v = Math.min(100, Math.max(0, parseFloat(riderInput.value) || 0));
    companyInput.value = Math.round((100 - v)*10)/10;
    updatePreview();
  });
  companyInput.addEventListener('input', ()=>{
    let v = Math.min(100, Math.max(0, parseFloat(companyInput.value) || 0));
    riderInput.value = Math.round((100 - v)*10)/10;
    updatePreview();
  });
  updatePreview();

  $('a-save-split').addEventListener('click', async ()=>{
    const companyPctNew = Math.min(100, Math.max(0, parseFloat(companyInput.value) || 0));
    const updated = Object.assign({}, fareRules, { commissionPct: companyPctNew });
    await db.collection('settings').doc('fareRules').set(updated);
    fareRules = updated;
    toast(`Split saved — riders now keep ${(100-companyPctNew).toFixed(0)}%, company keeps ${companyPctNew.toFixed(0)}% on every trip.`, 'ok');
  });
}

// ---- Admin: Dispatch Delivery ----
let aDispatchCache = [];
let aDispatchApprovedRiders = [];
async function aRenderDispatch(){
  const c = $('a-screen-dispatch'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-dispatch'));
  $('a-disp-base').value = deliveryPricing.baseFee;
  $('a-disp-perkm').value = deliveryPricing.perKm;
  $('a-disp-perkg').value = deliveryPricing.perKg;
  $('a-disp-min').value = deliveryPricing.minFee;
  $('a-disp-save-pricing').addEventListener('click', async ()=>{
    const updated = {
      baseFee: parseFloat($('a-disp-base').value)||0, perKm: parseFloat($('a-disp-perkm').value)||0,
      perKg: parseFloat($('a-disp-perkg').value)||0, minFee: parseFloat($('a-disp-min').value)||0
    };
    await db.collection('settings').doc('deliveryPricing').set(updated);
    deliveryPricing = updated;
    toast('Delivery pricing updated.', 'ok');
  });
  $('a-disp-search').addEventListener('input', aRenderDispatchList);
  $('a-disp-filter').addEventListener('change', aRenderDispatchList);

  try{
    const [dSnap, rSnap] = await Promise.all([
      db.collection('deliveries').get(),
      db.collection('riders').where('status','==','approved').get()
    ]);
    aDispatchCache = dSnap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    const dispRiderUserDocs = await Promise.all(rSnap.docs.map(d=> db.collection('users').doc(d.id).get()));
    aDispatchApprovedRiders = rSnap.docs.map((d,i)=>({ uid:d.id, ...d.data(), name: dispRiderUserDocs[i].exists ? dispRiderUserDocs[i].data().name : d.id }));

    const todayKey = commuteLocalDateStr(new Date());
    const todays = aDispatchCache.filter(d=>{
      const t = d.createdAt?.toDate?.(); return t && commuteLocalDateStr(t) === todayKey;
    });
    $('a-disp-today-count').textContent = todays.length;
    $('a-disp-today-revenue').textContent = fmtNaira(todays.filter(d=>d.status==='delivered').reduce((s,d)=>s+(d.fee||0),0));

    aRenderDispatchList();
  }catch(e){ $('a-disp-list').innerHTML = '<p class="muted" style="text-align:center;">Couldn\'t load deliveries.</p>'; }
}
function aRenderDispatchList(){
  const q = ($('a-disp-search').value||'').toLowerCase();
  const filter = $('a-disp-filter').value;
  const list = aDispatchCache.filter(d=>
    (filter==='all' || d.status===filter) &&
    (!q || (d.customerName||'').toLowerCase().includes(q))
  ).sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));

  const box = $('a-disp-list');
  if(!list.length){ box.innerHTML = '<p class="muted" style="text-align:center;">No matching deliveries.</p>'; return; }
  const riderOptions = `<option value="">— Unassigned —</option>` + aDispatchApprovedRiders.map(r=>`<option value="${r.uid}">${escapeHtml(r.name||r.uid)}</option>`).join('');

  box.innerHTML = list.map(d=>`
    <div class="card" style="margin-bottom:10px;">
      <div class="row"><strong>${escapeHtml(d.customerName)}</strong><span class="pill ${deliveryStatusPillClass(d.status)}">${DELIVERY_STATUS_LABELS[d.status]||d.status}</span></div>
      <p class="muted" style="margin-top:4px;font-size:12px;">${escapeHtml(d.pickup.address)} → ${escapeHtml(d.dropoff.address)}</p>
      <p class="muted" style="font-size:12px;">${escapeHtml(d.packageDescription)} · ${fmtNaira(d.fee)} · ${(d.paymentMethod||'').toUpperCase()}</p>
      <div class="field" style="margin-top:10px;margin-bottom:8px;"><label style="font-size:11px;">Assigned rider</label>
        <select data-assign="${d.id}" ${['delivered','cancelled'].includes(d.status)?'disabled':''}>${riderOptions}</select>
      </div>
      <div class="btn-block-row" data-actions="${d.id}"></div>
    </div>`).join('');

  box.querySelectorAll('[data-assign]').forEach(sel=>{
    sel.value = list.find(d=>d.id===sel.dataset.assign)?.riderId || '';
    sel.addEventListener('change', async ()=>{
      const rider = aDispatchApprovedRiders.find(r=>r.uid===sel.value);
      await db.collection('deliveries').doc(sel.dataset.assign).update({
        riderId: sel.value || null, riderName: rider ? (rider.name||'') : null,
        status: sel.value ? 'accepted' : 'pending'
      });
      toast(rider ? `Assigned to ${rider.name}.` : 'Unassigned.', 'ok');
    });
  });

  list.forEach(d=>{
    const actions = box.querySelector(`[data-actions="${d.id}"]`);
    if(!['delivered','cancelled'].includes(d.status)){
      const cancel = document.createElement('button'); cancel.className='btn btn-danger btn-sm'; cancel.textContent='Cancel';
      cancel.addEventListener('click', async ()=>{
        if(!confirm(`Cancel ${d.customerName}'s delivery?`)) return;
        await db.collection('deliveries').doc(d.id).update({status:'cancelled'});
        toast('Cancelled.','ok'); aRenderDispatch();
      });
      actions.append(cancel);
    }
    if(d.status !== 'disputed'){
      const dispute = document.createElement('button'); dispute.className='btn btn-outline btn-sm'; dispute.textContent='Mark disputed';
      dispute.addEventListener('click', async ()=>{
        await db.collection('deliveries').doc(d.id).update({status:'disputed'});
        toast('Marked as disputed.','ok'); aRenderDispatch();
      });
      actions.append(dispute);
    } else {
      const resolve = document.createElement('button'); resolve.className='btn btn-primary btn-sm'; resolve.textContent='Resolve → Delivered';
      resolve.addEventListener('click', async ()=>{
        await db.collection('deliveries').doc(d.id).update({status:'delivered'});
        toast('Resolved.','ok'); aRenderDispatch();
      });
      actions.append(resolve);
    }
  });
}

function aRenderSettings(){
  const c = $('a-screen-settings'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-settings'));
  $('a-support-phone').value = generalSettings.supportPhone || '';
  $('a-whatsapp-number').value = generalSettings.whatsappNumber || '';
  $('a-save-support-phone').addEventListener('click', async ()=>{
    const phone = $('a-support-phone').value.trim();
    const whatsapp = $('a-whatsapp-number').value.trim();
    if(!phone){ toast('Enter a phone number first.', 'err'); return; }
    await db.collection('settings').doc('general').set({ supportPhone: phone, whatsappNumber: whatsapp }, { merge:true });
    toast('Support & WhatsApp numbers updated — they reflect everywhere instantly.', 'ok');
  });
}

// ---- Admin: Commute Plans ----
let aCommutePlansCache = [];
let aCommuteApprovedRiders = [];
async function aRenderCommute(){
  const c = $('a-screen-commute'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-commute'));
  $('a-cd-1w').value = commuteDiscounts['1w'];
  $('a-cd-2w').value = commuteDiscounts['2w'];
  $('a-cd-1m').value = commuteDiscounts['1m'];
  $('a-cd-3m').value = commuteDiscounts['3m'];
  $('a-cd-6m').value = commuteDiscounts['6m'];
  $('a-cd-custom').value = commuteDiscounts['custom'];
  $('a-cd-save').addEventListener('click', async ()=>{
    const updated = {
      '1w': parseFloat($('a-cd-1w').value)||0, '2w': parseFloat($('a-cd-2w').value)||0,
      '1m': parseFloat($('a-cd-1m').value)||0, '3m': parseFloat($('a-cd-3m').value)||0,
      '6m': parseFloat($('a-cd-6m').value)||0, 'custom': parseFloat($('a-cd-custom').value)||0
    };
    await db.collection('settings').doc('commuteDiscounts').set(updated);
    commuteDiscounts = updated;
    toast('Discount tiers updated — new plans will use the new rates.', 'ok');
  });
  $('a-commute-search').addEventListener('input', aRenderCommuteList);
  $('a-commute-filter').addEventListener('change', aRenderCommuteList);
  $('a-commute-export').addEventListener('click', aExportCommuteCSV);

  try{
    const [plansSnap, ridersSnap] = await Promise.all([
      db.collection('commutePlans').get(),
      db.collection('riders').where('status','==','approved').get()
    ]);
    aCommutePlansCache = plansSnap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    const riderUserDocs = await Promise.all(ridersSnap.docs.map(d=> db.collection('users').doc(d.id).get()));
    aCommuteApprovedRiders = ridersSnap.docs.map((d,i)=>({ uid:d.id, ...d.data(), name: riderUserDocs[i].exists ? riderUserDocs[i].data().name : d.id }));
    const activePlans = aCommutePlansCache.filter(p=>p.status==='active');
    await commuteEnsureForPlans(activePlans); // top up the next few days for every active plan before reading today's rides

    // Today's upcoming rides across all commute plans
    const todayKey = commuteLocalDateStr(new Date());
    const todaySnap = await db.collection('rides').where('commuteDate','==', todayKey).get();
    const todayRides = todaySnap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    $('a-commute-today').innerHTML = todayRides.length ? todayRides.map(r=>`
      <div class="card" style="margin-bottom:8px;">
        <div class="row"><strong>${escapeHtml(r.passengerName)}</strong><span class="pill ${r.status==='completed'?'pill-grey':'pill-green'}">${r.status.toUpperCase()}</span></div>
        <p class="muted" style="margin-top:4px;font-size:12px;">${r.commuteLeg==='outbound'?'Pickup':'Return'} · ${escapeHtml(r.pickup.address)} → ${escapeHtml(r.destination.address)} · ${r.riderName?escapeHtml(r.riderName):'Unassigned (open marketplace)'}</p>
      </div>`).join('') : '<p class="muted">No scheduled rides for today.</p>';

    aRenderCommuteList();
  }catch(e){ $('a-commute-list').innerHTML = '<p class="muted" style="text-align:center;">Couldn\'t load scheduled ride plans.</p>'; }
}
function aRenderCommuteList(){
  const q = ($('a-commute-search').value||'').toLowerCase();
  const filter = $('a-commute-filter').value;
  const list = aCommutePlansCache.filter(p=>
    (filter==='all' || p.status===filter) &&
    (!q || (p.customerName||'').toLowerCase().includes(q))
  ).sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));

  const box = $('a-commute-list');
  if(!list.length){ box.innerHTML = '<p class="muted" style="text-align:center;">No matching scheduled ride plans.</p>'; return; }
  const riderOptions = `<option value="">— Unassigned (open marketplace) —</option>` + aCommuteApprovedRiders.map(r=>`<option value="${r.uid}">${escapeHtml(r.name||r.uid)}</option>`).join('');

  box.innerHTML = list.map(p=>`
    <div class="card" style="margin-bottom:10px;">
      <div class="row"><strong>${escapeHtml(p.customerName)}</strong><span class="pill ${commuteStatusPillClass(p.status)}">${p.status.replace('_',' ').toUpperCase()}</span></div>
      <p class="muted" style="margin-top:4px;font-size:12px;">${escapeHtml(p.pickup.address)} → ${escapeHtml(p.destination.address)}</p>
      <div class="row" style="margin-top:6px;"><span class="muted" style="font-size:12px;">Total price</span><span class="meter" style="font-size:16px;">${fmtNaira(p.totalPrice)}</span></div>
      <p class="muted" style="font-size:12px;">${p.daysOfWeek.join(', ')} · ${escapeHtml(p.pickupTime)}${p.hasReturn?' / '+escapeHtml(p.returnTime):''} · ${p.startDate} → ${p.endDate}</p>
      <div class="row" style="margin-top:6px;font-size:12px;"><span class="muted">Payment</span><span class="pill ${p.paymentStatus==='paid'?'pill-green':'pill-amber'}">${(p.paymentStatus||'unpaid').toUpperCase()}</span></div>
      <div class="field" style="margin-top:10px;margin-bottom:8px;"><label style="font-size:11px;">Assigned rider</label>
        <select data-assign="${p.id}">${riderOptions}</select>
      </div>
      <div class="btn-block-row" data-actions="${p.id}"></div>
    </div>`).join('');

  box.querySelectorAll('[data-assign]').forEach(sel=>{
    sel.value = list.find(p=>p.id===sel.dataset.assign)?.assignedRiderId || '';
    sel.addEventListener('change', async ()=>{
      const rider = aCommuteApprovedRiders.find(r=>r.uid===sel.value);
      await db.collection('commutePlans').doc(sel.dataset.assign).update({
        assignedRiderId: sel.value || null, assignedRiderName: rider ? (rider.name||'') : null
      });
      toast(rider ? `Assigned to ${rider.name}.` : 'Unassigned — will match via open marketplace.', 'ok');
    });
  });

  list.forEach(p=>{
    const actions = box.querySelector(`[data-actions="${p.id}"]`);
    if(p.status === 'pending_approval'){
      const approve = document.createElement('button'); approve.className='btn btn-primary btn-sm'; approve.textContent='Approve';
      approve.addEventListener('click', async ()=>{
        await db.collection('commutePlans').doc(p.id).update({ status:'active' });
        await notifyUser(p.customerId, 'Scheduled Ride approved!', 'Your scheduled ride plan is now active. We\'ll notify you as rides are scheduled.');
        toast('Plan approved.', 'ok'); aRenderCommute();
      });
      const reject = document.createElement('button'); reject.className='btn btn-danger btn-sm'; reject.textContent='Reject';
      reject.addEventListener('click', async ()=>{
        await db.collection('commutePlans').doc(p.id).update({ status:'rejected' });
        await notifyUser(p.customerId, 'Scheduled Ride declined', 'Your scheduled ride plan request was not approved. Contact support for details.');
        toast('Plan rejected.', 'ok'); aRenderCommute();
      });
      actions.append(approve, reject);
    }
    if(p.status === 'active'){
      const pause = document.createElement('button'); pause.className='btn btn-outline btn-sm'; pause.textContent='Pause';
      pause.addEventListener('click', async ()=>{ await db.collection('commutePlans').doc(p.id).update({status:'paused'}); toast('Paused.','ok'); aRenderCommute(); });
      actions.append(pause);
    }
    if(p.status === 'paused'){
      const resume = document.createElement('button'); resume.className='btn btn-primary btn-sm'; resume.textContent='Resume';
      resume.addEventListener('click', async ()=>{ await db.collection('commutePlans').doc(p.id).update({status:'active'}); toast('Resumed.','ok'); aRenderCommute(); });
      actions.append(resume);
    }
    if(['active','paused','pending_approval'].includes(p.status)){
      const cancel = document.createElement('button'); cancel.className='btn btn-danger btn-sm'; cancel.textContent='Cancel';
      cancel.addEventListener('click', async ()=>{
        if(!confirm(`Cancel ${p.customerName}'s scheduled ride plan?`)) return;
        await db.collection('commutePlans').doc(p.id).update({status:'cancelled'});
        toast('Cancelled.','ok'); aRenderCommute();
      });
      actions.append(cancel);
    }
    if(p.paymentStatus === 'unpaid'){
      const markPaid = document.createElement('button'); markPaid.className='btn btn-outline btn-sm'; markPaid.textContent='Mark payment received';
      markPaid.addEventListener('click', async ()=>{
        await db.collection('commutePlans').doc(p.id).update({ paymentStatus:'paid' });
        await db.collection('commutePayments').add({ planId:p.id, customerId:p.customerId, amount:p.totalPrice, type:p.paymentPlan||'full', status:'paid', createdAt: FieldValue.serverTimestamp() });
        toast('Marked as paid.','ok'); aRenderCommute();
      });
      actions.append(markPaid);
    }
    const notify = document.createElement('button'); notify.className='btn btn-outline btn-sm'; notify.textContent='📩 Notify customer';
    notify.addEventListener('click', async ()=>{
      const msg = prompt(`Message to ${p.customerName}:`);
      if(!msg) return;
      await notifyUser(p.customerId, 'Message from Zrider support', msg);
      toast('Notification sent.', 'ok');
    });
    actions.append(notify);
  });
}
function aExportCommuteCSV(){
  const rows = [['Customer','Pickup','Destination','Days','Pickup Time','Return Time','Start','End','Status','Payment Status','Total Price','Assigned Rider']];
  aCommutePlansCache.forEach(p=>{
    rows.push([p.customerName, p.pickup.address, p.destination.address, p.daysOfWeek.join('|'), p.pickupTime, p.returnTime||'', p.startDate, p.endDate, p.status, p.paymentStatus, p.totalPrice, p.assignedRiderName||'']);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `commute-plans-${commuteLocalDateStr(new Date())}.csv`;
  a.click();
}

// ---- Admin: Wallet Management ----
let aWalletFilter = 'deposits';
function aRenderWallet(){
  const c = $('a-screen-wallet'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-wallet'));
  $('a-wallet-filter').addEventListener('click', (e)=>{
    const btn = e.target.closest('button[data-wf]'); if(!btn) return;
    $('a-wallet-filter').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); aWalletFilter = btn.dataset.wf;
    aLoadWalletContent();
  });
  aWalletFilter = 'deposits';
  aLoadWalletContent();
}
async function aLoadWalletContent(){
  const box = $('a-wallet-content');
  box.innerHTML = '<div class="skel" style="height:70px;margin-top:14px;"></div>';
  if(aWalletFilter === 'deposits') await aLoadDeposits(box);
  else if(aWalletFilter === 'transactions') await aLoadAllTransactions(box);
  else if(aWalletFilter === 'manual-credit') aRenderManualCredit(box);
}
async function aLoadDeposits(box){
  const snap = await db.collection('deposits').orderBy('createdAt','desc').get();
  if(snap.empty){ box.innerHTML='<div class="empty-state"><p>No deposit requests yet.</p></div>'; return; }
  box.innerHTML='';
  snap.forEach(d=>{
    const dep = Object.assign({id:d.id}, d.data());
    const pillCls = dep.status==='approved'?'pill-green':dep.status==='rejected'?'pill-red':'pill-amber';
    const el = document.createElement('div'); el.className='card'; el.style.marginBottom='10px';
    el.innerHTML=`<div class="row"><strong>${escapeHtml(dep.userName||'User')}</strong><span class="pill ${pillCls}">${dep.status.toUpperCase()}</span></div>
      <div class="row" style="margin-top:6px;"><span class="muted">Amount</span><span class="meter" style="color:var(--amber-500);">${fmtNaira(dep.amount)}</span></div>
      <div class="row" style="margin-top:4px;font-size:12px;"><span class="muted">Method</span><span>${dep.method==='paystack'?'⚡ Paystack':'🏦 Bank transfer'}</span></div>
      ${dep.ref?`<div class="row" style="margin-top:4px;font-size:12px;"><span class="muted">Ref</span><span>${escapeHtml(dep.ref)}</span></div>`:''}
      ${dep.receiptDataUrl?`<img src="${dep.receiptDataUrl}" style="width:100%;border-radius:8px;margin-top:8px;max-height:160px;object-fit:cover;" onclick="this.style.maxHeight=this.style.maxHeight?'':'160px'">`:'' }
      <p class="muted" style="font-size:11px;margin-top:6px;">${timeAgo(dep.createdAt)}</p>
      <div class="btn-block-row" style="margin-top:10px;" data-actions></div>`;
    if(dep.status === 'pending'){
      const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.textContent='Approve';
      approveBtn.addEventListener('click', async ()=>{
        await db.collection('deposits').doc(dep.id).update({ status:'approved', approvedAt: FieldValue.serverTimestamp() });
        await creditWallet(dep.uid, dep.amount, `Bank deposit approved — ${fmtNaira(dep.amount)}`, { depositId:dep.id, method:'bank_transfer' });
        await notifyUser(dep.uid, '✅ Deposit approved', `Your deposit of ${fmtNaira(dep.amount)} has been credited to your wallet.`);
        toast('Deposit approved and wallet credited.','ok');
        aLoadWalletContent();
      });
      const rejectBtn = document.createElement('button'); rejectBtn.className='btn btn-outline btn-sm'; rejectBtn.style.color='var(--red-600)'; rejectBtn.style.borderColor='var(--red-600)'; rejectBtn.textContent='Reject';
      rejectBtn.addEventListener('click', async ()=>{
        const reason = prompt('Reason for rejection:') || 'Could not verify payment.';
        await db.collection('deposits').doc(dep.id).update({ status:'rejected', rejectionReason:reason });
        await notifyUser(dep.uid,'❌ Deposit not approved',`Your deposit of ${fmtNaira(dep.amount)} was not approved. Reason: ${reason}`);
        toast('Deposit rejected.'); aLoadWalletContent();
      });
      el.querySelector('[data-actions]').append(approveBtn, rejectBtn);
    }
    box.appendChild(el);
  });
}
async function aLoadAllTransactions(box){
  const usersSnap = await db.collection('users').limit(50).get();
  box.innerHTML = '';
  let allTx = [];
  for(const ud of usersSnap.docs){
    const txSnap = await db.collection('wallets').doc(ud.id).collection('transactions').orderBy('createdAt','desc').limit(10).get();
    txSnap.forEach(d=>{ allTx.push(Object.assign({id:d.id, userName:ud.data().name, uid:ud.id}, d.data())); });
  }
  allTx.sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
  if(!allTx.length){ box.innerHTML='<div class="empty-state"><p>No transactions yet.</p></div>'; return; }
  allTx.slice(0,60).forEach(tx=>{
    const el = document.createElement('div'); el.className='card'; el.style.marginBottom='8px';
    const isCredit = tx.type==='credit';
    el.innerHTML=`<div class="row"><div><strong style="font-size:13px;">${tx.userName}</strong><p class="muted" style="font-size:11px;">${tx.description}</p></div>
      <span class="meter" style="color:${isCredit?'var(--amber-500)':'var(--red-600)'}">${isCredit?'+':'-'}${fmtNaira(tx.amount)}</span></div>
      <p class="muted" style="font-size:11px;margin-top:4px;">${timeAgo(tx.createdAt)}</p>`;
    box.appendChild(el);
  });
}
function aRenderManualCredit(box){
  box.innerHTML=`<div class="card" style="margin-top:14px;">
    <div class="zr-eyebrow">MANUAL WALLET ADJUSTMENT</div>
    <div class="field" style="margin-top:12px;"><label>User email or UID</label><input type="text" id="mc-user" placeholder="Email address"></div>
    <div class="field"><label>Amount (₦)</label><input type="number" id="mc-amount" placeholder="e.g. 1000"></div>
    <div class="field"><label>Type</label><select id="mc-type"><option value="credit">Credit (add money)</option><option value="debit">Debit (remove money)</option></select></div>
    <div class="field"><label>Description</label><input type="text" id="mc-desc" placeholder="Reason for adjustment"></div>
    <button class="btn btn-primary" id="mc-submit">Apply adjustment</button>
    <p id="mc-msg" style="margin-top:8px;font-size:12px;"></p></div>`;
  box.querySelector('#mc-submit').addEventListener('click', async ()=>{
    const emailOrId = box.querySelector('#mc-user').value.trim();
    const amount = parseFloat(box.querySelector('#mc-amount').value);
    const type = box.querySelector('#mc-type').value;
    const desc = box.querySelector('#mc-desc').value.trim() || 'Admin adjustment';
    const msg = box.querySelector('#mc-msg');
    if(!emailOrId || !amount || amount<=0){ msg.textContent='Fill all fields.'; return; }
    let uid = emailOrId;
    if(emailOrId.includes('@')){
      const uSnap = await db.collection('users').where('email','==',emailOrId).limit(1).get();
      if(uSnap.empty){ msg.textContent='User not found.'; return; }
      uid = uSnap.docs[0].id;
    }
    try{
      if(type==='credit') await creditWallet(uid, amount, desc, { byAdmin:true });
      else await debitWallet(uid, amount, desc, { byAdmin:true });
      await notifyUser(uid, type==='credit'?'💰 Wallet credited':'Wallet adjusted', `${type==='credit'?fmtNaira(amount)+' has been added to':''+fmtNaira(amount)+' has been removed from'} your wallet by admin. Reason: ${desc}`);
      msg.style.color='var(--amber-500)'; msg.textContent=`${type==='credit'?'Credited':'Debited'} ${fmtNaira(amount)} successfully.`;
    }catch(e){ msg.style.color='var(--red-600)'; msg.textContent=e.message||'Failed.'; }
  });
}

// ---- Admin: Referral Management ----
async function aRenderReferrals(){
  const c = $('a-screen-referrals'); c.innerHTML = '';
  c.appendChild(clone('tpl-a-referrals'));
  $('a-ref-enabled').value = String(referralSettings.enabled);
  $('a-ref-reward').value = referralSettings.rewardAmount;
  $('a-ref-condition').value = referralSettings.condition;
  $('a-ref-auto').value = String(referralSettings.autoApprove);
  $('a-save-ref-settings').addEventListener('click', async ()=>{
    const updated = {
      enabled: $('a-ref-enabled').value === 'true',
      rewardAmount: parseFloat($('a-ref-reward').value)||500,
      condition: $('a-ref-condition').value,
      autoApprove: $('a-ref-auto').value === 'true'
    };
    await db.collection('settings').doc('referral').set(updated);
    Object.assign(referralSettings, updated);
    toast('Referral settings saved.','ok');
  });
  const list = $('a-ref-list');
  list.innerHTML='<div class="skel" style="height:60px;"></div>';
  try{
    const snap = await db.collection('referrals').orderBy('createdAt','desc').get();
    if(snap.empty){ list.innerHTML='<div class="empty-state"><p>No referrals yet.</p></div>'; return; }
    list.innerHTML='';
    snap.forEach(d=>{
      const r = Object.assign({id:d.id},d.data());
      const pillCls = r.status==='rewarded'?'pill-green':r.status==='pending_approval'?'pill-amber':'pill-grey';
      const el = document.createElement('div'); el.className='card'; el.style.marginBottom='8px';
      el.innerHTML=`<div class="row"><strong>${r.refereeName}</strong><span class="pill ${pillCls}">${r.status.replace('_',' ')}</span></div>
        <p class="muted" style="font-size:12px;margin-top:4px;">Reward: ${fmtNaira(r.reward||0)} · ${timeAgo(r.createdAt)}</p>
        <div data-actions></div>`;
      if(r.status==='pending_approval'){
        const approveBtn = document.createElement('button'); approveBtn.className='btn btn-primary btn-sm'; approveBtn.style.marginTop='8px'; approveBtn.textContent='Approve reward';
        approveBtn.addEventListener('click', async ()=>{
          await db.collection('referrals').doc(r.id).update({ status:'rewarded', awardedAt: FieldValue.serverTimestamp() });
          await creditWallet(r.referrerId, r.reward||referralSettings.rewardAmount, `Referral reward — ${r.refereeName}`, { referralId:r.id });
          await notifyUser(r.referrerId,'🎉 Referral reward approved!',`Your referral reward of ${fmtNaira(r.reward||referralSettings.rewardAmount)} has been credited.`);
          toast('Reward approved and credited.','ok'); aRenderReferrals();
        });
        el.querySelector('[data-actions]').appendChild(approveBtn);
      }
      list.appendChild(el);
    });
  }catch(e){ list.innerHTML='<div class="empty-state"><p>Could not load referrals.</p></div>'; }
}
