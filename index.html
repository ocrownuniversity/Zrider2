function pUpdateFare(){
  const warnEl = $('p-geofence-warning');
  warnEl.textContent = '';
  if(!pPickup || !pPickup.address || !pDestination || !pDestination.address){ $('p-fare-card').classList.add('hidden'); return; }

  let pickupOk = isLikelyInServiceArea(pPickup);
  let destOk = isLikelyInServiceArea(pDestination);

  if(!pickupOk){ warnEl.textContent = `Your pickup point looks outside ${serviceArea.name}. Zrider only operates within this area.`; $('p-fare-card').classList.add('hidden'); return; }
  if(!destOk){ warnEl.textContent = `Destination must be within ${serviceArea.name}. Zrider doesn't operate outside this zone yet.`; $('p-fare-card').classList.add('hidden'); return; }

  // Track this call so a later, faster-resolving call (e.g. the user kept
  // editing) can't get clobbered by a slower one finishing after it —
  // important on slow mobile connections where requests can complete out
  // of order.
  const requestToken = ++pFareRequestToken;

  $('p-fare-card').classList.remove('hidden');
  $('p-fare-amount').textContent = '…';
  $('p-fare-distance').textContent = 'Calculating…';

  resolveTripCoordinates(pPickup, pDestination).then(async (outcome)=>{
    if(requestToken !== pFareRequestToken) return; // superseded by a newer request

    if(outcome.error){
      $('p-fare-card').classList.add('hidden');
      warnEl.textContent = outcome.error;
      return;
    }
    if(outcome.ambiguousField){
      // Multiple plausible matches and we won't guess — force the person
      // to pick the right one from the same suggestion dropdown used
      // while typing, instead of silently choosing the top result.
      $('p-fare-card').classList.add('hidden');
      warnEl.textContent = `We found more than one match for your ${outcome.ambiguousField} — please pick the correct one from the list.`;
      if(outcome.showSuggestionsOn && outcome.showSuggestionsOn._zrForceSuggestions){
        outcome.showSuggestionsOn._zrForceSuggestions(outcome.options);
      }
      return;
    }

    const { distKm, durationMin, method } = await resolveRoute(pPickup.lat, pPickup.lng, pDestination.lat, pDestination.lng);
    if(requestToken !== pFareRequestToken) return;
    applyFareBreakdown(distKm, durationMin, method);
  });
}
let pFareRequestToken = 0;

// Makes sure both pPickup and pDestination end up with real coordinates
// before we ever attempt routing. Only resolves whichever side is
// actually missing coordinates — a location that already came from GPS
// or an explicit suggestion tap is never silently re-geocoded (and
// potentially replaced with a less precise match). When an address needs
// geocoding and multiple candidates come back, this does NOT auto-pick
// one — it reports back so the caller can force an explicit choice.
async function resolveTripCoordinates(pickup, destination){
  async function resolveSide(point, inputEl){
    if(point.lat != null && point.lng != null) return { ok:true };
    if(typeof navigator !== 'undefined' && navigator.onLine === false){
      // Fully offline — fall back to known locality keywords rather than
      // failing outright, since there's no network to search with anyway.
      const guess = bestKnownPositionForAddress(point.address);
      if(guess){ point.lat = guess.lat; point.lng = guess.lng; point._approx = true; return { ok:true }; }
      return { ok:false, error: `You appear to be offline and "${point.address}" isn't a recognized area. Reconnect and try again.` };
    }
    const results = await searchAddress(point.address);
    if(results.length === 0){
      // No hits at all from Nominatim — last resort, try our own curated
      // LGA/locality keyword list before giving up entirely.
      const guess = bestKnownPositionForAddress(point.address);
      if(guess){ point.lat = guess.lat; point.lng = guess.lng; point._approx = true; return { ok:true }; }
      return { ok:false, error: `We couldn't find "${point.address}". Please check the spelling or try a nearby landmark.` };
    }
    if(results.length === 1){
      point.lat = results[0].lat; point.lng = results[0].lng;
      return { ok:true };
    }
    // 2+ candidates — genuinely ambiguous, require an explicit choice.
    return { ok:false, ambiguous:true, options: results, inputEl };
  }

  const [pRes, dRes] = await Promise.all([
    resolveSide(pickup, $('p-pickup')),
    resolveSide(destination, $('p-destination'))
  ]);
  if(!pRes.ok){
    if(pRes.ambiguous) return { ambiguousField:'pickup', options:pRes.options, showSuggestionsOn:pRes.inputEl };
    return { error: pRes.error };
  }
  if(!dRes.ok){
    if(dRes.ambiguous) return { ambiguousField:'destination', options:dRes.options, showSuggestionsOn:dRes.inputEl };
    return { error: dRes.error };
  }
  return { ok:true };
}

// Real road-network distance + travel time via OSRM's free public routing
// server (no API key, no billing). Longitude,latitude order and the
// 'driving' profile are required by OSRM and verified below. Retries once
// on failure before falling back to a corrected straight-line estimate,
// which is clearly flagged via the returned `method` so the UI can mark
// the fare as approximate rather than presenting it as exact.
async function fetchOSRMRoute(lat1, lng1, lat2, lng2){
  // OSRM's coordinate order is lng,lat (the opposite of how we store
  // lat/lng everywhere else) — get this backwards and you silently get a
  // route between the wrong points, which is a classic source of "distance
  // is wrong" bugs. Assembled explicitly here, once, so it can't drift.
  const url = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=false&alternatives=false&steps=false`;
  const res = await fetchWithTimeout(url, {}, 8000);
  if(!res.ok) throw new Error('OSRM HTTP ' + res.status);
  const data = await res.json();
  if(!data || data.code !== 'Ok' || !Array.isArray(data.routes) || !data.routes[0]){
    throw new Error('OSRM returned no usable route');
  }
  const route = data.routes[0];
  if(!isFinite(route.distance) || !isFinite(route.duration) || route.distance <= 0){
    throw new Error('OSRM route had invalid distance/duration');
  }
  return { distKm: Math.max(0.3, route.distance / 1000), durationMin: Math.max(2, route.duration / 60) };
}

async function resolveRoute(lat1, lng1, lat2, lng2){
  // Sanity-check coordinate ranges up front — catches an accidental
  // lat/lng swap immediately instead of silently producing a nonsense
  // route halfway around the world.
  const coordsLookSane = Math.abs(lat1) <= 90 && Math.abs(lat2) <= 90 && Math.abs(lng1) <= 180 && Math.abs(lng2) <= 180;
  if(!coordsLookSane){
    console.warn('resolveRoute: coordinates out of range, check for a lat/lng swap', {lat1,lng1,lat2,lng2});
    return { distKm: 2.5, durationMin: 8, method:'estimate' };
  }

  const cacheKey = [lat1,lng1,lat2,lng2].map(n=>n.toFixed(4)).join(',');
  const cached = cacheGet(_routeCache, cacheKey, ROUTE_CACHE_TTL_MS);
  if(cached) return cached;

  if(typeof navigator === 'undefined' || navigator.onLine !== false){
    for(let attempt = 1; attempt <= 2; attempt++){
      try{
        const result = await fetchOSRMRoute(lat1, lng1, lat2, lng2);
        result.method = 'route';
        cacheSet(_routeCache, cacheKey, result);
        return result;
      }catch(e){
        if(attempt === 1){ await sleep(600); continue; } // one automatic retry before giving up
        // both attempts failed — fall through to the straight-line fallback below
      }
    }
  }

  // Last resort only: straight-line distance, corrected upward since real
  // roads are never perfectly straight, clearly flagged as an estimate.
  const straightKm = haversineKm(lat1, lng1, lat2, lng2);
  const roadKm = Math.max(0.3, straightKm * 1.35);
  const result = { distKm: roadKm, durationMin: roadKm * 3.2, method:'estimate' };
  cacheSet(_routeCache, cacheKey, result); // cache briefly too, avoids hammering during an outage
  return result;
}

function applyFareBreakdown(distKm, durationMin, method){
  const breakdown = computeFareBreakdown(distKm, durationMin);
  const isEstimate = method === 'estimate';
  const dc = $('p-fare-distance'); if(dc) dc.textContent = fmtKm(distKm) + (isEstimate ? ' (est.)' : '');
  const tc = $('p-fare-time'); if(tc) tc.textContent = '~' + breakdown.estMinutes + ' min';
  const bc = $('p-fare-base'); if(bc) bc.textContent = fmtNaira(breakdown.base);
  const dcc = $('p-fare-distcharge'); if(dcc) dcc.textContent = fmtNaira(breakdown.distCharge);
  const tcc = $('p-fare-timecharge'); if(tcc) tcc.textContent = fmtNaira(breakdown.timeCharge);
  const ac = $('p-fare-amount'); if(ac) ac.textContent = fmtNaira(breakdown.total);
  const note = $('p-fare-estimate-note'); if(note) note.classList.toggle('hidden', !isEstimate);
  const card = $('p-fare-card');
  if(card){
    card.classList.remove('hidden');
    card.dataset.distKm = distKm;
    card.dataset.fare = breakdown.total;
    card.dataset.isEstimate = isEstimate ? '1' : '0';
  }
}

// Deep last-resort fallback — only used when we're offline or Nominatim
// returns zero results, so there's genuinely no other way to get any
// coordinate at all. Reuses serviceZones/areaKeywords and the curated
// LOCALITY_POSITIONS so it always matches whatever coverage area is
// currently configured, and prefers the most specific (longest) matching
// keyword instead of the first one found.
function bestKnownPositionForAddress(address){
  const a = (address || '').toLowerCase();
  let best = null;
  for(const z of serviceZones){
    const keywords = z.areaKeywords && z.areaKeywords.length ? z.areaKeywords : [z.name];
    for(const k of keywords){
      const kLower = String(k).toLowerCase();
      if(a.includes(kLower) && (!best || kLower.length > best.kLower.length)){
        best = { kLower, z };
      }
    }
  }
  if(!best) return null;
  return LOCALITY_POSITIONS[best.kLower] || keywordFallbackPosition(best.kLower, best.z);
}
function estimateDistFromAddresses(addr1, addr2){
  const p = bestKnownPositionForAddress(addr1), d = bestKnownPositionForAddress(addr2);
  if(p && d) return Math.max(0.5, haversineKm(p.lat, p.lng, d.lat, d.lng));
  return 2.5; // last-resort default if both addresses are unrecognized
}

async function pRequestRide(){
  if(!pPickup || !pDestination) { toast('Set your pickup and destination first.', 'err'); return; }
  const distKm = parseFloat($('p-fare-card').dataset.distKm);
  const fare = parseFloat($('p-fare-card').dataset.fare);
  const fareIsEstimate = $('p-fare-card').dataset.isEstimate === '1';
  if(!isFinite(distKm) || !isFinite(fare) || fare <= 0){
    toast('Still calculating your fare — try again in a moment.', 'err');
    return;
  }
  const btn = $('p-request-ride'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  const paymentMethod = $('p-pay-method').value;

  try{
    // Wallet payment: check balance first
    if(paymentMethod === 'wallet'){
      const bal = await getWalletBalance(currentUser.uid);
      currentWalletBalance = bal;
      if(bal < fare){
        toast(`Insufficient wallet balance. You have ${fmtNaira(bal)}, need ${fmtNaira(fare)}.`, 'err');
        btn.disabled = false; btn.textContent = 'Request bike';
        openDepositModal();
        return;
      }
      // Debit wallet immediately
      await debitWallet(currentUser.uid, fare, `Ride payment — ${pPickup.address} → ${pDestination.address}`, { method:'wallet' });
      currentWalletBalance = bal - fare;
    }

    const rideRef = await db.collection('rides').add({
      passengerId: currentUser.uid,
      passengerName: currentUserDoc.name,
      passengerPhone: currentUserDoc.phone || '',
      riderId: null,
      pickup: pPickup,
      destination: pDestination,
      distanceKm: distKm,
      fare: fare,
      fareIsEstimate: fareIsEstimate,
      paymentMethod,
      paymentStatus: paymentMethod === 'cash' ? 'pending_cash' : paymentMethod === 'wallet' ? 'paid_wallet' : 'pending_online',
      status: 'searching',
      passengerActive: true,
      riderActive: false,
      passengerRated: false,
      createdAt: FieldValue.serverTimestamp()
    });

    if(paymentMethod === 'card'){
      const ok = await collectPaystackPayment(fare, async (ref)=>{
        await db.collection('rides').doc(rideRef.id).update({ paymentStatus:'paid_online', paystackRef: ref });
      });
      if(!ok){ /* payment failed/cancelled */ }
    }
    toast('Looking for a nearby rider…', 'ok');
  }catch(e){
    console.error('Ride request failed:', e);
    toast(`Could not request a ride: ${e.message || e.code || 'unknown error'}`, 'err');
    btn.disabled = false; btn.textContent = 'Request bike';
  }
}

function pSheetSearching(sheet, ride){
  sheet.appendChild(clone('tpl-p-searching'));
  const startMs = ride.createdAt?.toMillis?.() || Date.now();
  const elapsedEl = $('p-search-elapsed');
  function tick(){
    const secs = Math.max(0, Math.floor((Date.now() - startMs)/1000));
    const m = Math.floor(secs/60).toString().padStart(2,'0');
    const s = (secs%60).toString().padStart(2,'0');
    if(elapsedEl) elapsedEl.textContent = `${m}:${s}`;
  }
  tick();
  pSearchTimerInterval = setInterval(tick, 1000);
  $('p-cancel-search').addEventListener('click', ()=>{
    promptCancelReason(CANCEL_REASONS_PASSENGER, async (reason)=>{
      await db.collection('rides').doc(ride.id).update({ status:'cancelled', passengerActive:true, cancelledBy:'passenger', cancelReason:reason });
      toast('Ride request cancelled.');
    });
  });
}

async function pSheetActive(sheet, ride){

  const statusMap = { accepted:['pill-amber','RIDER ON THE WAY'], arriving:['pill-amber','RIDER ARRIVING'], ongoing:['pill-green','TRIP IN PROGRESS'] };
  const [cls,label] = statusMap[ride.status] || ['pill-grey','UPDATING'];
  const pill = $('p-ride-status-pill');
  pill.className = 'pill ' + cls;
  pill.innerHTML = `<span class="pill-dot"></span>${label}`;
  renderStepper($('p-ride-stepper'), [
    {key:'accepted',label:'Accepted'}, {key:'arriving',label:'Arriving'},
    {key:'ongoing',label:'In trip'}, {key:'completed',label:'Done'}
  ], ride.status);
  $('p-ride-fare').textContent = fmtNaira(ride.fare);
  if(ride.status === 'ongoing' && ride.startedAt){
    const startMs = ride.startedAt.toMillis ? ride.startedAt.toMillis() : Date.now();
    function tickFare(){
      const elapsedMin = (Date.now() - startMs) / 60000;
      const live = Math.round((ride.fare + elapsedMin * (fareRules.perMin||10)) / 10) * 10;
      const el = $('p-ride-fare');
      if(el) el.textContent = fmtNaira(live);

  }
  $('p-route-pickup').textContent = ride.pickup.address;
  $('p-route-dest').textContent = ride.destination.address;

  if(ride.riderId){
    const rsnap = await db.collection('users').doc(ride.riderId).get();

    if(rsnap.exists){

function pSheetRate(sheet, ride){
  sheet.appendChild(clone('tpl-p-rate'));
  $('p-receipt-pickup').textContent = ride.pickup.address;
  $('p-receipt-dest').textContent = ride.destination.address;
  $('p-receipt-distance').textContent = fmtKm(ride.distanceKm);
  $('p-receipt-payment').textContent = ride.paymentMethod === 'card' ? 'Card / Bank' : 'Cash';
  $('p-receipt-fare').textContent = fmtNaira(ride.fare);
  $('p-rate-rider-name').textContent = ride.riderName || 'your rider';
  let rating = 5;
  const stars = $('p-stars').querySelectorAll('svg');
  function paint(){ stars.forEach(s => s.classList.toggle('on', parseInt(s.dataset.v) <= rating)); }
  paint();
  stars.forEach(s => s.addEventListener('click', ()=>{ rating = parseInt(s.dataset.v); paint(); }));
  $('p-submit-rating').addEventListener('click', async ()=>{
    const comment = $('p-rate-comment').value.trim();
    await db.collection('rides').doc(ride.id).update({ passengerRated:true, riderRatingByPassenger:rating, riderComment:comment, passengerActive:false });
    if(ride.riderId){
      const uref = db.collection('users').doc(ride.riderId);
      const usnap = await uref.get();
      const ud = usnap.data();
      const newCount = (ud.ratingCount||0)+1;
      const newRating = (((ud.rating||5)*(ud.ratingCount||0)) + rating)/newCount;
      await uref.update({ rating:newRating, ratingCount:newCount });
    }
    toast('Thanks for your feedback!', 'ok');
  });
}

function pRenderCommuteForm(){
  const c = $('p-screen-commute');
  c.innerHTML = '';
  c.appendChild(clone('tpl-p-commute-form'));
  $('p-commute-form-back').addEventListener('click', pRenderCommuteTab);

  // Reflect the admin's actual configured discount percentages, not stale hardcoded ones
  $('cf-duration').innerHTML = Object.entries(COMMUTE_DURATIONS).map(([key, cfg])=>{
    const pct = commuteDiscounts[key] ?? 0;
    const label = pct > 0 ? `${cfg.label} (${pct}% off)` : `${cfg.label}${key==='custom'?' (no discount)':''}`;
    return `<option value="${key}" ${key==='1m'?'selected':''}>${label}</option>`;
  }).join('');

  let cfPickup = null, cfDestination = null;
  attachFreeAutocomplete($('cf-pickup'), place => { cfPickup = place; $('cf-pickup').value = place.address; recalcEstimate(); });
  attachFreeAutocomplete($('cf-destination'), place => { cfDestination = place; $('cf-destination').value = place.address; recalcEstimate(); });

  $('cf-days').innerHTML = COMMUTE_DAYS.map(d=>`<button type="button" class="btn btn-outline btn-sm" data-day="${d.key}" style="padding:6px 12px;">${d.label}</button>`).join('');
  const dayBtns = $('cf-days').querySelectorAll('[data-day]');
  ['mon','tue','wed','thu','fri'].forEach(k=>{ // sensible weekday default
    const b = [...dayBtns].find(x=>x.dataset.day===k); if(b) b.classList.add('active-day');
  });
  dayBtns.forEach(b=> b.addEventListener('click', ()=>{ b.classList.toggle('active-day'); recalcEstimate(); }));

  const today = new Date();
  $('cf-start').value = commuteLocalDateStr(today);
  $('cf-start').min = commuteLocalDateStr(today);

  $('cf-has-return').addEventListener('change', ()=>{
    $('cf-return-time-field').classList.toggle('hidden', !$('cf-has-return').checked);
    recalcEstimate();
  });
  $('cf-duration').addEventListener('change', ()=>{
    $('cf-end-field').classList.toggle('hidden', $('cf-duration').value !== 'custom');
    recalcEstimate();
  });
  ['cf-pickup-time','cf-return-time','cf-start','cf-end'].forEach(id=> $(id).addEventListener('change', recalcEstimate));

  function selectedDays(){ return [...$('cf-days').querySelectorAll('[data-day].active-day')].map(b=>b.dataset.day); }
  function computeEndDate(){
    const dur = $('cf-duration').value;
    if(dur === 'custom') return $('cf-end').value || null;
    const start = new Date($('cf-start').value || commuteLocalDateStr(today));
    const weeks = COMMUTE_DURATIONS[dur].weeks;
    const end = new Date(start); end.setDate(end.getDate() + weeks*7 - 1);
    return commuteLocalDateStr(end);
  }
  function recalcEstimate(){
    const box = $('cf-estimate');
    const days = selectedDays();
    const endDate = computeEndDate();
    if(!cfPickup || !cfDestination || !days.length || !endDate){
      box.innerHTML = '<p class="muted">Fill in the details above to see your estimate.</p>';
      return;
    }
    const distKm = Math.max(0.3, haversineKm(cfPickup.lat, cfPickup.lng, cfDestination.lat, cfDestination.lng) * 1.35);
    const hasReturn = $('cf-has-return').checked;
    const est = commuteComputeEstimate({
      distanceKm: distKm, returnDistanceKm: hasReturn ? distKm : null,
      startDate: $('cf-start').value, endDate, daysOfWeek: days, durationType: $('cf-duration').value
    });
    box.innerHTML = `
      <div class="row"><span class="muted">Estimated distance</span><span>${distKm.toFixed(1)} km ${hasReturn?'(one-way)':''}</span></div>
      <div class="row" style="margin-top:6px;"><span class="muted">Cost per day</span><span>${fmtNaira(est.costPerDay)}</span></div>
      <div class="row" style="margin-top:6px;"><span class="muted">Total trips</span><span>${est.totalTrips} (${est.tripDays} days)</span></div>
      ${est.discountPct>0?`<div class="row" style="margin-top:6px;"><span class="muted">Discount</span><span style="color:var(--amber-500);">${est.discountPct}% off</span></div>`:''}
      <div class="divider" style="margin:8px 0;"></div>
      <div class="row"><strong>Total subscription price</strong><span class="meter" style="font-size:18px;">${fmtNaira(est.totalPrice)}</span></div>`;
  }

  $('cf-submit').addEventListener('click', async ()=>{
    const days = selectedDays();
    const endDate = computeEndDate();
    if(!cfPickup || !cfDestination){ toast('Set your pickup and destination.', 'err'); return; }
    if(!days.length){ toast('Pick at least one day of the week.', 'err'); return; }
    if(!endDate){ toast('Set an end date for your custom duration.', 'err'); return; }
    const hasReturn = $('cf-has-return').checked;
    const distKm = Math.max(0.3, haversineKm(cfPickup.lat, cfPickup.lng, cfDestination.lat, cfDestination.lng) * 1.35);
    const btn = $('cf-submit'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try{
      await commuteCreatePlan({
        pickup: cfPickup, destination: cfDestination, hasReturn,
        pickupTime: $('cf-pickup-time').value, returnTime: $('cf-return-time').value,
        daysOfWeek: days, startDate: $('cf-start').value, endDate, durationType: $('cf-duration').value,
        distanceKm: distKm, returnDistanceKm: distKm, paymentPlan: $('cf-payment-plan').value
      });
      toast('Scheduled ride plan submitted for approval!', 'ok');
      pRenderCommuteTab();
    }catch(e){ toast('Could not submit — try again.', 'err'); btn.disabled=false; btn.textContent='Review & submit plan'; }
  });
}

      </div>
      <h4 style="margin-top:18px;">Ride history</h4>
      <div style="margin-top:8px;">${rides.length ? rides.map(r=>`
        <div class="row" style="font-size:12px;padding:8px 0;border-bottom:1px solid var(--surface-2);">
          <span>${escapeHtml(r.commuteDate)} · ${r.commuteLeg}</span>
          <div class="row gap" style="align-items:center;">
            <span class="pill pill-grey" style="font-size:9px;">${r.status.toUpperCase()}</span>
            ${r.status==='completed'?`<button class="btn btn-ghost btn-sm" data-ride-receipt="${r.id}" style="padding:2px 6px;font-size:11px;">🧾 Receipt</button>`:''}
          </div>
        </div>`).join('') : '<p class="muted" style="font-size:12px;">No rides generated yet.</p>'}</div>
      <h4 style="margin-top:18px;">Payment history</h4>
      <div style="margin-top:8px;">${payments.length ? payments.map(pay=>`
        <div class="row" style="font-size:12px;padding:8px 0;border-bottom:1px solid var(--surface-2);">
          <span>${fmtNaira(pay.amount)} · ${pay.type}</span><span class="pill pill-grey" style="font-size:9px;">${(pay.status||'').toUpperCase()}</span>
        </div>`).join('') : '<p class="muted" style="font-size:12px;">No payments recorded yet.</p>'}</div>
    `;
    body.querySelectorAll('[data-ride-receipt]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const ride = rides.find(r=>r.id === btn.dataset.rideReceipt);
        if(ride) openReceiptModal(ride);
      });
    });

    // ---- Calendar ----
    let calMonth = new Date();
    const skipSelections = new Set();
    let skipMode = false;
    function renderCalendar(){
      const box = overlay.querySelector('#cd-calendar');
      const year = calMonth.getFullYear(), month = calMonth.getMonth();
      overlay.querySelector('#cd-cal-label').textContent = calMonth.toLocaleDateString('en-NG',{month:'long', year:'numeric'});
      const firstDay = new Date(year, month, 1);
      const startOffset = firstDay.getDay(); // 0=Sun
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const cells = [];
      for(let i=0;i<startOffset;i++) cells.push('');
      for(let d=1; d<=daysInMonth; d++) cells.push(d);
      const dowLabels = ['S','M','T','W','T','F','S'];
      let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;">`;
      html += dowLabels.map(l=>`<span class="muted" style="font-size:10px;">${l}</span>`).join('');
      cells.forEach(d=>{
        if(!d){ html += `<span></span>`; return; }
        const dateObj = new Date(year, month, d);
        const key = commuteLocalDateStr(dateObj);
        const isToday = key === todayKey;
        const inRange = key >= p.startDate && key <= p.endDate;
        const isSchedDay = p.daysOfWeek.includes(commuteDayKey(dateObj.getDay()));
        const isSkipped = (p.skippedDates||[]).includes(key) || (p.pausedDates||[]).includes(key);
        const isSelected = skipSelections.has(key);
        let bg = 'transparent', color = 'var(--ink-400)';
        if(inRange && isSchedDay && !isSkipped){ bg = 'var(--amber-500)'; color = '#fff'; }
        if(inRange && isSchedDay && isSkipped){ bg = 'var(--red-600)'; color = '#fff'; }
        if(isSelected){ bg = 'var(--green-600)'; color = '#fff'; }
        const canSkip = skipMode && inRange && isSchedDay && !isSkipped && key >= todayKey;
        html += `<span data-cal-day="${key}" style="padding:5px 0;border-radius:6px;font-size:11px;background:${bg};color:${color};border:${isToday?'1.5px solid var(--ink-900)':'1.5px solid transparent'};cursor:${canSkip?'pointer':'default'};">${d}</span>`;
      });
      html += `</div>`;
      box.innerHTML = html;
      if(skipMode){
        box.querySelectorAll('[data-cal-day]').forEach(el=>{
          const key = el.dataset.calDay;
          const inRange = key >= p.startDate && key <= p.endDate;
          const isSchedDay = p.daysOfWeek.includes(commuteDayKey(new Date(key).getDay()));
          const isSkipped = (p.skippedDates||[]).includes(key) || (p.pausedDates||[]).includes(key);
          if(inRange && isSchedDay && !isSkipped && key >= todayKey){
            el.addEventListener('click', ()=>{
              if(skipSelections.has(key)) skipSelections.delete(key); else skipSelections.add(key);
              renderCalendar();
            });
          }
        });
      }
    }
    renderCalendar();
    overlay.querySelector('#cd-cal-prev').addEventListener('click', ()=>{ calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()-1, 1); renderCalendar(); });
    overlay.querySelector('#cd-cal-next').addEventListener('click', ()=>{ calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 1); renderCalendar(); });

    // ---- Auto-renew toggle ----
    const renewTrack = overlay.querySelector('#cd-auto-renew-track');
    const renewKnob = overlay.querySelector('#cd-auto-renew-knob');
    const renewCheckbox = overlay.querySelector('#cd-auto-renew');
    renewTrack.addEventListener('click', async ()=>{
      const newVal = !renewCheckbox.checked;
      renewCheckbox.checked = newVal;
      renewTrack.style.background = newVal ? 'var(--amber-500)' : 'var(--surface-2)';
      renewKnob.style.left = newVal ? '19px' : '3px';
      await db.collection('commutePlans').doc(planId).update({ autoRenew: newVal });
      toast(newVal ? 'Auto-renew turned on.' : 'Auto-renew turned off.', 'ok');
    });

    body.querySelector('[data-verify-rider]')?.addEventListener('click', (e)=> openVerifyRiderModal(e.target.dataset.verifyRider));
    body.querySelector('[data-act="edit-times"]')?.addEventListener('click', ()=> overlay.querySelector('#cd-edit-times').classList.toggle('hidden'));
    overlay.querySelector('#cd-save-times')?.addEventListener('click', async ()=>{
      const updates = { pickupTime: overlay.querySelector('#cd-edit-pickup-time').value };
      if(p.hasReturn) updates.returnTime = overlay.querySelector('#cd-edit-return-time').value;
      await db.collection('commutePlans').doc(planId).update(updates);
      toast('Times updated — takes effect from the next generated ride.', 'ok');
      closeModal(); openCommutePlanDetail(planId);
    });
    body.querySelector('[data-act="pause"]')?.addEventListener('click', async ()=>{
      await db.collection('commutePlans').doc(planId).update({ status:'paused' });
      toast('Plan paused.', 'ok'); closeModal(); pRenderCommuteTab();
    });
    body.querySelector('[data-act="resume"]')?.addEventListener('click', async ()=>{
      await db.collection('commutePlans').doc(planId).update({ status:'active' });
      toast('Plan resumed.', 'ok'); closeModal(); pRenderCommuteTab();
    });
    body.querySelector('[data-act="skip"]')?.addEventListener('click', ()=>{
      skipMode = !skipMode;
      const btn = body.querySelector('[data-act="skip"]');
      if(skipMode){
        btn.textContent = `✔ Confirm skip (0 selected)`;
        renderCalendar();
        // Watch selections and update button label live
        const obs = new MutationObserver(()=>{ btn.textContent = `✔ Confirm skip (${skipSelections.size} selected)`; });
        obs.observe(overlay.querySelector('#cd-calendar'), {childList:true, subtree:true});
      } else {
        if(skipSelections.size){
          db.collection('commutePlans').doc(planId).update({ skippedDates: FieldValue.arrayUnion(...skipSelections) })
            .then(()=>{ toast(`Skipped ${skipSelections.size} date(s).`, 'ok'); closeModal(); pRenderCommuteTab(); });
        } else {
          btn.textContent = '⏭ Skip dates';
        }
      }
    });
    body.querySelector('[data-act="extend"]')?.addEventListener('click', async ()=>{
      const weeks = prompt('Extend by how many weeks?', '4');
      if(!weeks || isNaN(weeks)) return;
      const newEnd = new Date(p.endDate); newEnd.setDate(newEnd.getDate() + parseInt(weeks)*7);
      await db.collection('commutePlans').doc(planId).update({ endDate: commuteLocalDateStr(newEnd) });
      toast('Plan extended.', 'ok'); closeModal(); pRenderCommuteTab();
    });
    body.querySelector('[data-act="cancel"]')?.addEventListener('click', async ()=>{
      if(!confirm('Cancel this scheduled ride plan? This cannot be undone.')) return;
      await db.collection('commutePlans').doc(planId).update({ status:'cancelled' });
      toast('Plan cancelled.', 'ok'); closeModal(); pRenderCommuteTab();
    });
    body.querySelector('[data-act="pay"]')?.addEventListener('click', async ()=>{
      try{
        const bal = await getWalletBalance(currentUser.uid);
        if(bal < p.totalPrice){ toast(`Insufficient wallet balance. You have ${fmtNaira(bal)}.`, 'err'); openDepositModal(); return; }
        await debitWallet(currentUser.uid, p.totalPrice, `Scheduled ride payment — ${p.pickup.address} → ${p.destination.address}`, { planId });
        await db.collection('commutePayments').add({ planId, customerId: currentUser.uid, amount: p.totalPrice, type: p.paymentPlan||'full', status:'paid', createdAt: FieldValue.serverTimestamp() });
        await db.collection('commutePlans').doc(planId).update({ paymentStatus:'paid' });
        toast('Payment successful!', 'ok'); closeModal(); pRenderCommuteTab();
      }catch(e){ toast('Payment failed.', 'err'); }
    });
  });
}

// ---- Passenger: Dispatch Delivery ----
function openDispatchModal(){
  openModal('tpl-modal-dispatch-list', async (overlay)=>{
    overlay.querySelector('#disp-new').addEventListener('click', ()=>{ closeModal(); dispatchRenderForm(); });
    const box = overlay.querySelector('#disp-list');
    try{
      const snap = await db.collection('deliveries').where('customerId','==', currentUser.uid).get();
      const list = snap.docs.map(d=>Object.assign({id:d.id}, d.data())).sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
      if(!list.length){ box.innerHTML = '<p class="muted" style="text-align:center;padding:16px 0;">No deliveries yet. Send your first package above.</p>'; return; }
      box.innerHTML = list.map(d=>`
        <div class="card" style="margin-bottom:8px;cursor:pointer;" data-delivery="${d.id}">
          <div class="row"><strong>${escapeHtml(d.pickup.address)} → ${escapeHtml(d.dropoff.address)}</strong><span class="pill ${deliveryStatusPillClass(d.status)}">${DELIVERY_STATUS_LABELS[d.status]||d.status}</span></div>
          <p class="muted" style="margin-top:4px;font-size:12px;">${escapeHtml(d.packageDescription)} · ${fmtNaira(d.fee)}</p>
        </div>`).join('');
      box.querySelectorAll('[data-delivery]').forEach(c=> c.addEventListener('click', ()=>{ closeModal(); openDeliveryDetail(c.dataset.delivery); }));
    }catch(e){ box.innerHTML = '<p class="muted" style="text-align:center;">Couldn\'t load your deliveries.</p>'; }
  });
}

function dispatchRenderForm(){
  openModal('tpl-modal-dispatch-form', (overlay)=>{
    let dfPickup = null, dfDropoff = null;
    let dfStops = []; // [{place, inputEl}]
    attachFreeAutocomplete(overlay.querySelector('#df-pickup'), place => { dfPickup = place; overlay.querySelector('#df-pickup').value = place.address; recalc(); });
    attachFreeAutocomplete(overlay.querySelector('#df-dropoff'), place => { dfDropoff = place; overlay.querySelector('#df-dropoff').value = place.address; recalc(); });
    overlay.querySelector('#df-sender-name').value = currentUserDoc.name || '';
    overlay.querySelector('#df-sender-phone').value = currentUserDoc.phone || '';
    overlay.querySelector('#df-category').innerHTML = DELIVERY_CATEGORIES.map(c=>`<option value="${c.key}">${c.label}</option>`).join('');

    // Extra stops (up to 2) — each is its own address autocomplete field
    overlay.querySelector('#df-add-stop').addEventListener('click', ()=>{
      if(dfStops.length >= 2){ toast('You can add up to 2 extra stops.', 'err'); return; }
      const idx = dfStops.length;
      const wrap = document.createElement('div');
      wrap.className = 'field';
      wrap.innerHTML = `<label>Extra stop ${idx+1}</label><div class="row gap"><input type="text" style="flex:1;" placeholder="Additional drop-off address"><button class="btn btn-ghost btn-sm" data-remove-stop>✕</button></div>`;
      overlay.querySelector('#df-extra-stops').appendChild(wrap);
      const input = wrap.querySelector('input');
      const stopEntry = { place:null };
      attachFreeAutocomplete(input, place => { stopEntry.place = place; input.value = place.address; recalc(); });
      dfStops.push(stopEntry);
      wrap.querySelector('[data-remove-stop]').addEventListener('click', ()=>{
        dfStops = dfStops.filter(s=>s!==stopEntry);
        wrap.remove(); recalc();
      });
      if(dfStops.length >= 2) overlay.querySelector('#df-add-stop').classList.add('hidden');
    });

    // Saved templates
    (async ()=>{
      const templates = currentUserDoc.deliveryTemplates || [];
      if(templates.length){
        overlay.querySelector('#df-template-field').classList.remove('hidden');
        const sel = overlay.querySelector('#df-template-select');
        sel.innerHTML = '<option value="">— Start from scratch —</option>' + templates.map((t,i)=>`<option value="${i}">${escapeHtml(t.name)}</option>`).join('');
        sel.addEventListener('change', ()=>{
          if(sel.value === '') return;
          const t = templates[parseInt(sel.value)];
          if(!t) return;
          dfPickup = t.pickup; dfDropoff = t.dropoff;
          overlay.querySelector('#df-pickup').value = t.pickup.address;
          overlay.querySelector('#df-dropoff').value = t.dropoff.address;
          overlay.querySelector('#df-recipient-name').value = t.recipientName || '';
          overlay.querySelector('#df-recipient-phone').value = t.recipientPhone || '';
          overlay.querySelector('#df-category').value = t.category || 'other';
          recalc();
        });
      }
    })();

    overlay.querySelector('#df-schedule-type').addEventListener('change', ()=>{
      overlay.querySelector('#df-scheduled-field').classList.toggle('hidden', overlay.querySelector('#df-schedule-type').value !== 'scheduled');
    });
    ['df-category','df-weight'].forEach(id=> overlay.querySelector('#'+id).addEventListener('input', recalc));

    function totalRouteKm(){
      const waypoints = [dfPickup, ...dfStops.map(s=>s.place).filter(Boolean), dfDropoff].filter(Boolean);
      let total = 0;
      for(let i=0; i<waypoints.length-1; i++){
        total += haversineKm(waypoints[i].lat, waypoints[i].lng, waypoints[i+1].lat, waypoints[i+1].lng) * 1.35;
      }
      return Math.max(0.3, total);
    }
    function recalc(){
      const box = overlay.querySelector('#df-estimate');
      if(!dfPickup || !dfDropoff){ box.innerHTML = '<p class="muted">Fill in pickup and delivery address to see your fee estimate.</p>'; return; }
      const distKm = totalRouteKm();
      const weight = parseFloat(overlay.querySelector('#df-weight').value) || 1;
      const category = overlay.querySelector('#df-category').value;
      const b = computeDeliveryFeeBreakdown(distKm, weight, category);
      box.innerHTML = `
        <div class="row"><span class="muted">Estimated distance</span><span>${distKm.toFixed(1)} km${dfStops.filter(s=>s.place).length?' (incl. '+dfStops.filter(s=>s.place).length+' extra stop'+(dfStops.filter(s=>s.place).length>1?'s':'')+')':''}</span></div>
        <div class="divider" style="margin:8px 0;"></div>
        <div class="row" style="font-size:12.5px;"><span class="muted">Base fee</span><span>${fmtNaira(b.baseFee)}</span></div>
        <div class="row" style="font-size:12.5px;margin-top:4px;"><span class="muted">Distance charge</span><span>${fmtNaira(b.distanceCharge)}</span></div>
        <div class="row" style="font-size:12.5px;margin-top:4px;"><span class="muted">Weight charge</span><span>${fmtNaira(b.weightCharge)}</span></div>
        ${b.categorySurcharge > 0 ? `<div class="row" style="font-size:12.5px;margin-top:4px;"><span class="muted">${b.categoryLabel} surcharge</span><span>${fmtNaira(b.categorySurcharge)}</span></div>` : ''}
        ${b.minFeeTopUp > 0 ? `<div class="row" style="font-size:12.5px;margin-top:4px;"><span class="muted">Minimum fee adjustment</span><span>${fmtNaira(b.minFeeTopUp)}</span></div>` : ''}
        <div class="divider" style="margin:8px 0;"></div>
        <div class="row"><strong>Estimated delivery fee</strong><span class="meter" style="font-size:18px;">${fmtNaira(b.total)}</span></div>`;
    }

    overlay.querySelector('#df-submit').addEventListener('click', async ()=>{
      if(!dfPickup || !dfDropoff){ toast('Set pickup and delivery address.', 'err'); return; }
      const senderName = overlay.querySelector('#df-sender-name').value.trim();
      const senderPhone = overlay.querySelector('#df-sender-phone').value.trim();
      const recipientName = overlay.querySelector('#df-recipient-name').value.trim();
      const recipientPhone = overlay.querySelector('#df-recipient-phone').value.trim();
      const description = overlay.querySelector('#df-description').value.trim();
      if(!senderName || !senderPhone || !recipientName || !recipientPhone || !description){ toast('Fill in every field.', 'err'); return; }
      const scheduleType = overlay.querySelector('#df-schedule-type').value;
      const scheduledFor = overlay.querySelector('#df-scheduled-for').value;
      if(scheduleType==='scheduled' && !scheduledFor){ toast('Pick a scheduled time.', 'err'); return; }
      const weight = parseFloat(overlay.querySelector('#df-weight').value) || 1;
      const category = overlay.querySelector('#df-category').value;
      const paymentMethod = overlay.querySelector('#df-payment').value;
      const distKm = totalRouteKm();
      const stops = dfStops.map(s=>s.place).filter(Boolean);
      const btn = overlay.querySelector('#df-submit'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try{
        if(paymentMethod === 'wallet'){
          const bal = await getWalletBalance(currentUser.uid);
          const fee = computeDeliveryFee(distKm, weight, category);
          if(bal < fee){ toast(`Insufficient wallet balance. You have ${fmtNaira(bal)}.`, 'err'); btn.disabled=false; btn.textContent='Send delivery request'; return; }
        }
        if(paymentMethod === 'card'){ toast('Card payment isn\'t set up yet — choose Wallet or Cash on Delivery for now.', 'err'); btn.disabled=false; btn.textContent='Send delivery request'; return; }
        const id = await dispatchCreateDelivery({
          pickup: dfPickup, dropoff: dfDropoff, stops, senderName, senderPhone, recipientName, recipientPhone,
          packageDescription: description, category, weightKg: weight, distanceKm: distKm,
          scheduleType, scheduledFor, paymentMethod
        });
        if(overlay.querySelector('#df-save-template').checked){
          const templateName = prompt('Name this template (e.g. "Office to Warehouse"):', recipientName);
          if(templateName){
            const newTemplate = { name: templateName, pickup: dfPickup, dropoff: dfDropoff, recipientName, recipientPhone, category };
            const updated = [...(currentUserDoc.deliveryTemplates||[]), newTemplate];
            await db.collection('users').doc(currentUser.uid).update({ deliveryTemplates: updated });
            currentUserDoc.deliveryTemplates = updated;
            toast('Template saved for next time.', 'ok');
          }
        }
        toast('Delivery request sent!', 'ok');
        closeModal();
        openDeliveryDetail(id);
      }catch(e){ toast('Could not send request — try again.', 'err'); btn.disabled=false; btn.textContent='Send delivery request'; }
    });
  });
}

async function openDeliveryDetail(deliveryId){
  openModal('tpl-modal-dispatch-detail', async (overlay)=>{
    const body = overlay.querySelector('#dd-body');
    const render = async ()=>{
      const doc = await db.collection('deliveries').doc(deliveryId).get();
      if(!doc.exists){ body.innerHTML = '<p class="muted">Delivery not found.</p>'; return; }
      const d = Object.assign({id:doc.id}, doc.data());
      let riderInfo = '';
      if(d.riderId){
        const [uSnap, rSnap] = await Promise.all([db.collection('users').doc(d.riderId).get(), db.collection('riders').doc(d.riderId).get()]);
        const u = uSnap.exists ? uSnap.data() : {};
        const riderCode = rSnap.exists ? rSnap.data().riderCode : '';
        riderInfo = `<div class="card" style="margin-top:12px;">
          <div class="row"><strong>${escapeHtml(u.name||'Rider')}</strong><span class="pill pill-green">Assigned</span></div>
          <p class="muted" style="font-size:12px;margin-top:4px;">${rSnap.exists ? escapeHtml(rSnap.data().bikeModel||'')+' · '+escapeHtml(rSnap.data().plate||'') : ''}</p>
          <div class="row gap" style="margin-top:10px;">
            <a class="btn btn-outline btn-sm" href="tel:${u.phone||''}">📞 Call</a>
            <button class="btn btn-outline btn-sm" id="dd-chat">💬 Chat</button>
            <button class="btn btn-outline btn-sm" data-verify-rider="${riderCode||''}">🛡️ Verify</button>
          </div>
        </div>`;
      }
      const stepOrder = ['pending','accepted','heading_to_pickup','picked_up','in_transit','delivered'];
      const stepLabels = ['Pending','Assigned','Heading to pickup','Picked up','In transit','Delivered'];
      const curStepIdx = ['disputed','cancelled'].includes(d.status) ? -1 : stepOrder.indexOf(d.status);
      const stepperHtml = curStepIdx === -1 ? '' : `
        <div class="row" style="margin-top:14px;overflow-x:auto;gap:0;">
          ${stepOrder.map((s,i)=>`
            <div style="flex:1;min-width:52px;text-align:center;">
              <div style="width:22px;height:22px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
                background:${i<=curStepIdx?'var(--amber-500)':'var(--surface-2)'};color:${i<=curStepIdx?'#fff':'var(--ink-400)'};">${i<curStepIdx?'✓':i+1}</div>
              <p style="font-size:9px;margin-top:4px;color:${i<=curStepIdx?'var(--ink-900)':'var(--ink-400)'};">${stepLabels[i]}</p>
            </div>
            ${i<stepOrder.length-1?`<div style="flex:1;height:2px;background:${i<curStepIdx?'var(--amber-500)':'var(--surface-2)'};margin-top:10px;"></div>`:''}
          `).join('')}
        </div>`;
      const stopsHtml = (d.stops && d.stops.length) ? `
        <div style="margin-top:10px;">
          <p class="muted" style="font-size:11px;">Additional stops</p>
          ${d.stops.map((s,i)=>`<p style="font-size:12.5px;margin-top:2px;">${i+1}. ${escapeHtml(s.address)}</p>`).join('')}
        </div>` : '';
      const breakdownHtml = d.feeBreakdown ? `
        <div class="card" style="margin-top:12px;">
          <p class="muted" style="font-size:11px;margin-bottom:6px;">COST BREAKDOWN</p>
          <div class="row" style="font-size:12px;"><span class="muted">Base fee</span><span>${fmtNaira(d.feeBreakdown.baseFee)}</span></div>
          <div class="row" style="font-size:12px;margin-top:4px;"><span class="muted">Distance</span><span>${fmtNaira(d.feeBreakdown.distanceCharge)}</span></div>
          <div class="row" style="font-size:12px;margin-top:4px;"><span class="muted">Weight</span><span>${fmtNaira(d.feeBreakdown.weightCharge)}</span></div>
          ${d.feeBreakdown.categorySurcharge>0?`<div class="row" style="font-size:12px;margin-top:4px;"><span class="muted">${escapeHtml(d.feeBreakdown.categoryLabel||'')} surcharge</span><span>${fmtNaira(d.feeBreakdown.categorySurcharge)}</span></div>`:''}
        </div>` : '';
      body.innerHTML = `
        <div class="row"><span class="pill ${deliveryStatusPillClass(d.status)}">${DELIVERY_STATUS_LABELS[d.status]||d.status}</span><span class="meter">${fmtNaira(d.fee)}</span></div>
        ${stepperHtml}
        <p style="margin-top:14px;font-size:13px;">${escapeHtml(d.pickup.address)} → ${escapeHtml(d.dropoff.address)}</p>
        ${stopsHtml}
        <p class="muted" style="font-size:12px;margin-top:4px;">${escapeHtml(d.packageDescription)} · ${d.weightKg}kg · ${DELIVERY_CATEGORIES.find(c=>c.key===d.category)?.label||d.category}</p>
        <p class="muted" style="font-size:12px;">To: ${escapeHtml(d.recipientName)} (${escapeHtml(d.recipientPhone)})</p>
        ${riderInfo}
        ${breakdownHtml}
        ${d.proofOfDeliveryDataUrl ? `<div style="margin-top:12px;"><p class="muted" style="font-size:12px;margin-bottom:6px;">Proof of delivery</p><img src="${d.proofOfDeliveryDataUrl}" id="dd-pod-photo" style="width:100%;border-radius:10px;cursor:zoom-in;"></div>` : ''}
        <div class="row gap" style="margin-top:14px;flex-wrap:wrap;">
          ${!['delivered','cancelled'].includes(d.status) ? `<button class="btn btn-outline btn-sm" id="dd-track-link">🔗 Share tracking link</button>`:''}
          ${!['delivered','cancelled'].includes(d.status) ? `<button class="btn btn-danger btn-sm" id="dd-cancel">Cancel delivery</button>`:''}
          ${d.status==='delivered' && !d.customerRated ? `<button class="btn btn-amber btn-sm" id="dd-rate">⭐ Rate rider</button>`:''}
        </div>`;
      overlay.querySelector('#dd-chat')?.addEventListener('click', ()=> openDeliveryChat(deliveryId, 'Rider'));
      overlay.querySelector('[data-verify-rider]')?.addEventListener('click', (e)=> openVerifyRiderModal(e.target.dataset.verifyRider));
      overlay.querySelector('#dd-pod-photo')?.addEventListener('click', ()=> openImageLightbox(d.proofOfDeliveryDataUrl));
      overlay.querySelector('#dd-track-link')?.addEventListener('click', async ()=>{
        const url = `${location.origin}${location.pathname}?track=${deliveryId}`;
        const text = `Track your Zrider package: ${url}`;
        if(navigator.share){
          try{ await navigator.share({ title:'Track your Zrider delivery', text, url }); }catch(e){ /* cancelled */ }
        } else {
          await navigator.clipboard.writeText(url).catch(()=>{});
          toast('Tracking link copied — send it to the recipient.', 'ok');
        }
      });
      overlay.querySelector('#dd-cancel')?.addEventListener('click', async ()=>{
        if(!confirm('Cancel this delivery?')) return;
        await db.collection('deliveries').doc(deliveryId).update({ status:'cancelled' });
        toast('Delivery cancelled.', 'ok'); render();
      });
      overlay.querySelector('#dd-rate')?.addEventListener('click', async ()=>{
        const stars = prompt('Rate your rider 1-5 stars:', '5');
        const n = parseInt(stars);
        if(!n || n<1 || n>5) return;
        await db.collection('deliveries').doc(deliveryId).update({ customerRated:true });
        if(d.riderId){
          const rSnap = await db.collection('users').doc(d.riderId).get();
          const cur = rSnap.exists ? (rSnap.data().rating||5) : 5;
          const cnt = rSnap.exists ? (rSnap.data().ratingCount||0) : 0;
          const newAvg = ((cur*cnt) + n) / (cnt+1);
          await db.collection('users').doc(d.riderId).update({ rating: newAvg, ratingCount: cnt+1 });
        }
        toast('Thanks for rating your rider!', 'ok'); render();
      });
    };
    render();
  });
}

        <div class="divider" style="margin:8px 0;"></div>
        <div class="row" style="font-size:12.5px;"><span class="muted">Status</span><span>✅ Successful</span></div>
        <div class="divider" style="margin:8px 0;"></div>

          <p style="font-weight:800;color:var(--green-600);font-size:13.5px;">Powered by ZRider</p>
          <p class="muted" style="font-size:11.5px;margin-top:2px;">zriderservice@gmail.com · ${escapeHtml(generalSettings.supportPhone||'')}</p>
        </div>
      </div>`;
    overlay.querySelector('#receipt-print').addEventListener('click', ()=> printReceipt(body.innerHTML));
    overlay.querySelector('#receipt-share').addEventListener('click', async (e)=>{
      const btn = e.currentTarget;
      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Preparing image…';
      const fallbackShareText = async ()=>{
        const text = `Zrider Trip Receipt\n${dateStr}, ${timeStr}\n${r.pickup.address} → ${r.destination.address}\nDistance: ${fmtKm(r.distanceKm)}\nTotal paid: ${fmtNaira(r.fare)}`;
        if(navigator.share){
          try{ await navigator.share({ title:'Zrider Trip Receipt', text }); }catch(err){ /* user cancelled */ }
        } else {
          await navigator.clipboard.writeText(text).catch(()=>{});
          toast('Receipt copied — paste it anywhere to share.', 'ok');
        }
      };
      try{
        if(typeof html2canvas !== 'function') throw new Error('html2canvas not loaded');
        const target = document.getElementById('receipt-print-area');
        const canvasPromise = html2canvas(target, { backgroundColor:'#ffffff', scale:1.5, useCORS:true, allowTaint:true, logging:false });
        const timeoutPromise = new Promise((_, reject)=> setTimeout(()=> reject(new Error('Image generation timed out')), 7000));
        const canvas = await Promise.race([canvasPromise, timeoutPromise]);
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        if(!blob) throw new Error('Could not generate image');
        const file = new File([blob], `zrider-receipt-${r.id.slice(0,8)}.png`, { type:'image/png' });
        if(navigator.canShare && navigator.canShare({ files:[file] })){
          await navigator.share({ files:[file], title:'Zrider Trip Receipt' });
        } else {
          // No file-sharing support (e.g. desktop browser) — download the
          // image instead so it can still be shared manually as a picture.
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = file.name; a.click();
          URL.revokeObjectURL(url);
          toast('Receipt image downloaded — share it as a picture from your files.', 'ok');
        }
      }catch(err){
        await fallbackShareText();
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
      }
    });
  });
}
// Opens a clean, isolated print window with just the receipt — avoids
// printing the whole app UI (nav bars, buttons, etc.) along with it.
function printReceipt(innerHtml){
  const w = window.open('', '_blank', 'width=400,height=600');
  if(!w){ toast('Please allow pop-ups to print the receipt.', 'err'); return; }
  w.document.write(`<html><head><title>Zrider Receipt</title>
    <style>
      body{font-family:system-ui,sans-serif;padding:20px;color:#14241B;}
      .row{display:flex;justify-content:space-between;}
      .muted{color:#6B7B72;} .divider{border-top:1px solid #ddd;}
      .brand-name{font-weight:800;} .accent{color:#146339;}
      .meter{font-family:'Noto Sans','Inter',system-ui,sans-serif;font-weight:800;}
    </style></head><body>${innerHtml}</body></html>`);
  w.document.close();
  w.onload = ()=>{ w.print(); };
}

async function loadWalletTransactions(container, uid){
  container.innerHTML = '<div class="skel" style="height:50px;margin-bottom:8px;"></div><div class="skel" style="height:50px;"></div>';
  try{
    const snap = await db.collection('wallets').doc(uid).collection('transactions')
      .orderBy('createdAt','desc').limit(30).get();
    if(snap.empty){ container.innerHTML = '<div class="empty-state"><p>No transactions yet</p></div>'; return; }
    container.innerHTML = '';
    snap.forEach(d=>{
      const tx = d.data();
      const isCredit = tx.type === 'credit';
      const el = document.createElement('div');
      el.className = 'card';
      el.style.marginBottom = '8px';
      el.innerHTML = `<div class="row">
        <div style="flex:1;"><strong style="font-size:13px;">${tx.description||tx.type}</strong><p class="muted" style="font-size:11px;margin-top:2px;">${timeAgo(tx.createdAt)}</p></div>
        <span class="meter" style="font-size:16px;color:${isCredit?'var(--amber-500)':'var(--red-600)'}">${isCredit?'+':'-'}${fmtNaira(tx.amount)}</span>
      </div>`;
      container.appendChild(el);
    });
  }catch(e){ container.innerHTML = '<div class="empty-state"><p>Could not load transactions.</p></div>'; }
}

  document.body.appendChild(overlay);

  overlay.querySelector('#ps-deposit-submit').addEventListener('click', async ()=>{
    const amount = parseFloat(overlay.querySelector('#ps-deposit-amount').value);

    closeModal();
    const ok = await collectPaystackPayment(amount, async (ref)=>{
      await creditWallet(currentUser.uid, amount, `Paystack deposit — ${fmtNaira(amount)}`, { paystackRef: ref, method:'paystack' });
      await db.collection('deposits').add({
        uid: currentUser.uid, userName: currentUserDoc.name, amount,
        method:'paystack', status:'approved', paystackRef: ref, createdAt: FieldValue.serverTimestamp()

      currentWalletBalance += amount;
      toast(`₦${amount.toLocaleString()} added to your wallet!`, 'ok');
      pSwitchTab('wallet');

  });

function loadNotificationsInto(containerId, uid, role){
  const list = $(containerId);
  list.innerHTML = '<div class="skel" style="height:50px;margin-bottom:10px;"></div>';
  Promise.all([
    db.collection('notifications').where('uid','==',uid).get(),
    db.collection('notifications').where('audience','==','all').get(),
    db.collection('notifications').where('audience','==',role).get()
  ]).then(([a,b,c])=>{
    const map = {};
    [...a.docs, ...b.docs, ...c.docs].forEach(d=> map[d.id] = Object.assign({id:d.id}, d.data()));
    let items = Object.values(map);
    items.sort((x,y)=> (y.createdAt?.toMillis?.()||0) - (x.createdAt?.toMillis?.()||0));
    if(items.length===0){ list.innerHTML = `<div class="empty-state"><div>🔔</div><p>No notifications yet</p></div>`; return; }
    list.innerHTML = '';
    items.forEach(n=>{
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<strong style="font-size:14px;">${escapeHtml(n.title)}</strong><p class="muted" style="margin-top:4px;">${escapeHtml(n.message)}</p><p class="muted" style="margin-top:6px;font-size:11px;">${timeAgo(n.createdAt)}</p>`;
      list.appendChild(el);
    });
  }).catch(()=>{ list.innerHTML = `<div class="empty-state"><p>Couldn't load notifications.</p></div>`; });
}

// ---- Shared: tiny auto-advancing carousel (used pre-login: services + testimonials) ----
function setupCarousel({trackId, dotsId, prevId, nextId, slides, renderSlide, onSlideClick, interval=5000}){
  const track = document.getElementById(trackId);
  const dots = document.getElementById(dotsId);
  if(!track) return;
  let idx = 0, timer = null;
  function render(){
    track.innerHTML = renderSlide(slides[idx], idx);
    if(dots){
      dots.innerHTML = slides.map((_,i)=>
        `<span data-dot="${i}" style="width:${i===idx?'18px':'7px'};height:7px;border-radius:4px;background:${i===idx?'var(--amber-500)':'rgba(255,255,255,.25)'};transition:width .2s;cursor:pointer;display:inline-block;"></span>`
      ).join('');
      dots.querySelectorAll('[data-dot]').forEach(d=> d.addEventListener('click', ()=>{ idx = parseInt(d.dataset.dot); render(); resetTimer(); }));
    }
  }
  function next(){ idx = (idx+1) % slides.length; render(); }
  function prev(){ idx = (idx-1+slides.length) % slides.length; render(); }
  function resetTimer(){ if(timer) clearInterval(timer); timer = setInterval(next, interval); }
  document.getElementById(prevId)?.addEventListener('click', ()=>{ prev(); resetTimer(); });
  document.getElementById(nextId)?.addEventListener('click', ()=>{ next(); resetTimer(); });
  if(onSlideClick) track.addEventListener('click', ()=> onSlideClick(slides[idx], idx));
  render();
  resetTimer();
}

async function verifyRiderByCode(rawCode, resultBox){

  resultBox.innerHTML = '<div class="skel" style="height:90px;"></div>';

    resultBox.innerHTML = `<div class="card" style="background:var(--red-100);border:1px solid var(--red-600);">

  try{
    // Only riders with status 'approved' are ever shown — pending, rejected,
    // and suspended riders (which also use the 'rejected' status internally)

    const snap = await db.collection('riders').where('riderCode','==',code).limit(1).get();

      <div class="divider"></div>
      <div class="row"><span class="muted">Bike Model</span><span>${escapeHtml(rd.bikeModel||'—')}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="muted">Plate Number</span><span>${escapeHtml(rd.plate||'—')}</span></div>
      <div class="divider"></div>
      <div class="row"><span class="muted">Driving License</span><span>${escapeHtml(rd.licenseNo||'—')}</span></div>
      <button class="btn btn-outline btn-sm" id="verify-rate-rider" style="margin-top:14px;width:100%;">⭐ Rate this rider</button>
    </div>`;
    if(u.photoURL) makeAvatarZoomable(resultBox.querySelector('#verify-rider-photo'), u.photoURL);
    resultBox.querySelector('#verify-rate-rider').addEventListener('click', async ()=>{
      const stars = prompt(`Rate ${u.name||'this rider'} 1-5 stars:`, '5');

// ============================== RIDER APP ==============================
let rCurrentTab = 'home';
let rDeclinedIds = new Set();

// Reused across every alert instead of creating a brand-new AudioContext
// each time a request comes in. Mobile browsers cap how many AudioContexts
// can exist at once, and the old code created one per ring and never closed
// it — after a handful of bookings that limit was silently exhausted, so
// the ringtone worked for the first request or two and then quietly did
// nothing for every booking after that (the try/catch swallowed the
// failure). Keeping one shared context and resuming it if it was ever
// auto-suspended fixes ringing for every incoming booking, not just the
// first ones.
let _rAlertCtx = null;
function alertNewRequest(){
  try{
    if(navigator.vibrate) navigator.vibrate([200,80,200]);
    if(!_rAlertCtx) _rAlertCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _rAlertCtx;
    if(ctx.state === 'suspended') ctx.resume();
    [880, 1175].forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.18, ctx.currentTime + i*0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.18 + 0.16);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + i*0.18);
      osc.stop(ctx.currentTime + i*0.18 + 0.17);
    });
  }catch(e){ /* audio not available — silent fail is fine */ }
}

}

function rRenderHomeTab(){
  const c = $('r-screen-home');
  c.innerHTML = '';
  c.appendChild(clone('tpl-r-home'));
  $('r-greeting-line').textContent = getGreeting();
  $('r-greeting-name').textContent = (currentUserDoc.name || '').split(' ')[0] || 'there';
  renderSupportPhoneEverywhere();
  renderMapInto('map-rider','map-rider-fallback', null);
  getCurrentPosition().then(pos => renderMapInto('map-rider','map-rider-fallback', pos)).catch(()=>{});
  rRenderSheetIdle();
  // Subscribed exactly once per rider-app mount — previously this was
  // called from rRenderSheetIdle() itself, which ran every single time
  // the sheet returned to idle (after declining a ride, after finishing a
  // trip, etc.), silently stacking up a new duplicate Firestore listener
  // each time with no limit. Over a session that meant more and more
  // redundant listeners all racing to redraw the same UI, which could
  // eventually make new requests appear to stop showing up reliably.
  rListenIncomingRequests();
}

function rRenderSheetIdle(){
  const sheet = $('r-sheet');
  if(!sheet) return;
  sheet.innerHTML = '';
  sheet.appendChild(clone('tpl-r-idle'));
  const toggle = $('r-online-toggle');
  toggle.checked = !!riderDoc.online;
  const DAILY_GOAL = 5000;
  const todayEarnings = riderDoc.todayEarnings || 0;
  $('r-today-earnings').textContent = fmtNaira(todayEarnings);
  $('r-today-trips').textContent = (riderDoc.todayTrips || 0).toString();
  $('r-goal-label').textContent = `${fmtNaira(todayEarnings)} / ${fmtNaira(DAILY_GOAL)}`;
  setTimeout(()=>{
    const bar = $('r-goal-bar');
    if(bar) bar.style.width = Math.min(100, (todayEarnings/DAILY_GOAL)*100).toFixed(1) + '%';
  }, 100);
  paintToggle();
  document.querySelector('#r-sheet label').addEventListener('click', async (e)=>{
    e.preventDefault();
    const goingOnline = !toggle.checked;
    toggle.checked = goingOnline;
    paintToggle();
    await setRiderOnline(goingOnline);
  });
  function paintToggle(){
    $('r-toggle-track').style.background = toggle.checked ? 'var(--amber-500)' : 'var(--surface-2)';
    $('r-toggle-knob').style.left = toggle.checked ? '25px' : '3px';
    $('r-toggle-knob').style.background = toggle.checked ? '#000' : '#fff';
    $('r-status-label').textContent = toggle.checked ? "You're online" : "You're offline";
  }
}

async function setRiderOnline(online){
  riderDoc.online = online;
  await db.collection('riders').doc(currentUser.uid).update({ online });
  if(online){
    if(navigator.geolocation){
      watchId = navigator.geolocation.watchPosition(pos=>{
        db.collection('riders').doc(currentUser.uid).update({ location: { lat:pos.coords.latitude, lng:pos.coords.longitude } }).catch(()=>{});
      }, ()=>{}, { enableHighAccuracy:true });
    }
    toast('You are online — looking for ride requests.', 'ok');
    rProcessIncomingSnapshot();
  } else {
    if(watchId!=null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
    toast('You are now offline.');
    $('r-pending-list-wrap')?.classList.add('hidden');
  }
}

// Ride IDs we've already sounded the alert for this session, so a rider
// who's mid-decline-flow (or just has the list open) still gets a fresh
// ding for a genuinely new second/third request, not just when the single
// top-priority card happens to change.
let rAlertedRideIds = new Set();

// Latest raw docs from the open-requests query, kept even while we're
// offline/mid-trip and skipping the render below. Firestore's onSnapshot
// only fires again when the query results actually change server-side —
// it does NOT re-fire just because riderDoc.online flipped locally. Without
// caching this, a request placed while a rider was offline (or mid-trip)
// would sit there unseen even after the rider went online, because no new
// write happened to re-trigger the listener. rProcessIncomingSnapshot()
// lets us re-run the same logic on demand, e.g. right after going online.
let _rLastRideDocs = [];

// ---- Rider: Delivery requests + active delivery ----
async function rRenderDeliverySection(){
  const listBox = $('r-delivery-list');
  const activeBox = $('r-active-delivery');
  if(!listBox || !activeBox) return;
  try{
    // My active delivery (already accepted by me, not yet delivered/cancelled)
    const mineSnap = await db.collection('deliveries').where('riderId','==', currentUser.uid).get();
    const mine = mineSnap.docs.map(d=>Object.assign({id:d.id}, d.data())).filter(d=>!['delivered','cancelled'].includes(d.status));
    if(mine.length){
      const d = mine[0];
      activeBox.innerHTML = rDeliveryActiveCardHtml(d);
      rWireDeliveryActiveCard(d);
    } else {
      activeBox.innerHTML = '<p class="muted" style="font-size:13px;">No active delivery right now.</p>';
    }

    // Open (unassigned) delivery requests
    const pendingSnap = await db.collection('deliveries').where('status','==','pending').get();
    const pending = pendingSnap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    if(!pending.length){ listBox.innerHTML = '<p class="muted" style="font-size:13px;">No delivery requests right now.</p>'; return; }
    listBox.innerHTML = pending.map(d=>`
      <div class="card" style="margin-bottom:8px;">
        <div class="row"><strong>${escapeHtml(d.pickup.address)} → ${escapeHtml(d.dropoff.address)}</strong><span class="meter">${fmtNaira(d.fee)}</span></div>
        <p class="muted" style="margin-top:4px;font-size:12px;">${escapeHtml(d.packageDescription)} · ${d.weightKg}kg · ${DELIVERY_CATEGORIES.find(c=>c.key===d.category)?.label||d.category}</p>
        <button class="btn btn-primary btn-sm" style="margin-top:8px;" data-accept="${d.id}">Accept delivery</button>
      </div>`).join('');
    listBox.querySelectorAll('[data-accept]').forEach(b=> b.addEventListener('click', async ()=>{
      if(mine.length){ toast('Finish your current delivery before accepting another.', 'err'); return; }
      b.disabled = true;
      try{
        await db.collection('deliveries').doc(b.dataset.accept).update({ riderId: currentUser.uid, riderName: currentUserDoc.name, status:'accepted' });
        toast('Delivery accepted!', 'ok');
        rRenderDeliverySection();
      }catch(e){ toast('Could not accept — it may have just been taken.', 'err'); b.disabled=false; }
    }));
  }catch(e){ listBox.innerHTML = '<p class="muted" style="font-size:13px;">Couldn\'t load delivery requests.</p>'; }
}

function rProcessIncomingSnapshot(){
  if(!riderDoc.online || activeRideId){
    const wrap = $('r-pending-list-wrap'); if(wrap) wrap.classList.add('hidden');
    return; // ignore while offline or mid-trip
  }
  const candidates = _rLastRideDocs
    .filter(r=> !rDeclinedIds.has(r.id) && isLikelyInServiceArea(r.pickup));
  candidates.sort((a,b)=> (a.createdAt?.toMillis?.()||0) - (b.createdAt?.toMillis?.()||0));

  // Alert for every request we haven't already alerted for — covers
  // multiple simultaneous pending rides, not just the newest one.
  let hasNewArrival = false;
  candidates.forEach(c=>{ if(!rAlertedRideIds.has(c.id)){ rAlertedRideIds.add(c.id); hasNewArrival = true; } });
  if(hasNewArrival) alertNewRequest();

  rRenderPendingList(candidates);

  if(candidates.length === 0){ if(rCurrentTab==='home' && !activeRideId) rRenderSheetIdle(); return; }
  if(rCurrentTab==='home' && !activeRideId) rRenderSheetIncoming(candidates[0]);
}

function rListenIncomingRequests(){
  const unsub = db.collection('rides').where('status','==','searching').where('riderId','==',null)
    .onSnapshot(snap=>{
      _rLastRideDocs = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
      rProcessIncomingSnapshot();
    }, err => {
      // Previously this only logged to console, so a Firestore permission
      // error (e.g. security rules blocking reads of unassigned rides where
      // riderId is null) failed completely silently — the rider would just
      // never see any requests with no visible sign anything was wrong.
      console.warn('incoming requests listener error', err);
      if(err && err.code === 'permission-denied'){
        toast('Cannot load ride requests — check Firestore security rules for the rides collection.', 'err');
      }
    });
  activeListeners.push(unsub);
}

// Persistent list of every open ride request, visible any time the rider
// is online — separate from the single "top priority" card in the sheet,
// so a rider can see and act on more than one waiting request at a time
// instead of only ever seeing them one-by-one in sequence.
function rRenderPendingList(candidates){
  const wrap = $('r-pending-list-wrap');
  const count = candidates.length;

  // Badge on the "Requests" bottom-nav tab — visible from any tab, so the
  // rider can see there's a pending request even while on Earnings/Trips.
  const badge = $('r-requests-badge');
  if(badge){
    if(riderDoc.online && count > 0){ badge.textContent = count > 9 ? '9+' : String(count); badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  }

  const cardHtml = r => `
    <div class="card" style="margin-bottom:10px;">
      <div class="row">
        <strong style="font-size:14.5px;">${escapeHtml(r.passengerName || 'Passenger')}</strong>
        <span class="meter" style="font-size:15px;">${fmtNaira(r.fare)}</span>
      </div>
      <div class="row" style="margin-top:6px;"><span class="muted" style="font-size:12.5px;">Pickup</span><span style="font-size:12.5px;text-align:right;max-width:65%;">${escapeHtml(r.pickup.address)}</span></div>
      <div class="row" style="margin-top:4px;"><span class="muted" style="font-size:12.5px;">Destination</span><span style="font-size:12.5px;text-align:right;max-width:65%;">${escapeHtml(r.destination.address)}</span></div>
      <div class="row" style="margin-top:4px;"><span class="muted" style="font-size:12.5px;">Distance</span><span class="meter" style="font-size:13px;">${fmtKm(r.distanceKm)}</span></div>
      <div class="btn-block-row" style="margin-top:10px;">
        <button class="btn btn-outline r-pending-decline" style="color:var(--red-600);border-color:var(--red-600);padding:9px;font-size:13px;" data-ride-id="${r.id}">Decline</button>
        <button class="btn btn-primary r-pending-accept" style="padding:9px;font-size:13px;" data-ride-id="${r.id}">Accept</button>
      </div>
    </div>
  `;
  const wireButtons = listEl=>{
    listEl.querySelectorAll('.r-pending-decline').forEach(btn=>{
      btn.addEventListener('click', ()=>{ rDeclinedIds.add(btn.dataset.rideId); rRenderSheetIdle(); rProcessIncomingSnapshot(); });
    });
    listEl.querySelectorAll('.r-pending-accept').forEach(btn=>{
      btn.addEventListener('click', ()=> rAcceptRide(btn.dataset.rideId, btn));
    });
  };

  // Home tab's pending panel (only shown while online and non-empty).
  if(wrap){
    if(!riderDoc.online || count === 0){ wrap.classList.add('hidden'); }
    else {
      wrap.classList.remove('hidden');
      const countEl = $('r-pending-count'); if(countEl) countEl.textContent = count;
      const list = $('r-pending-list');
      if(list){ list.innerHTML = candidates.map(cardHtml).join(''); wireButtons(list); }
    }
  }

  // Dedicated Requests tab — always reflects the current state (including
  // offline/empty messaging) whether or not the rider is currently on it.
  const reqList = $('r-requests-list');
  const reqEmpty = $('r-requests-empty');
  const reqOffline = $('r-requests-offline-msg');
  if(reqList){
    if(!riderDoc.online){
      reqOffline?.classList.remove('hidden');
      reqEmpty?.classList.add('hidden');
      reqList.innerHTML = '';
    } else if(count === 0){
      reqOffline?.classList.add('hidden');
      reqEmpty?.classList.remove('hidden');
      reqList.innerHTML = '';
    } else {
      reqOffline?.classList.add('hidden');
      reqEmpty?.classList.add('hidden');
      reqList.innerHTML = candidates.map(cardHtml).join('');
      wireButtons(reqList);
    }
  }
}

// Shared accept logic used by both the single "top priority" incoming
// card and the full pending-requests list, so accepting works the same
// way (and with the same race-condition safety) from either place.
async function rAcceptRide(rideId, btnEl){
  if(btnEl){ btnEl.disabled = true; btnEl.innerHTML = '<span class="spinner"></span>'; }
  try{
    await db.runTransaction(async (tx)=>{
      const ref = db.collection('rides').doc(rideId);
      const fresh = await tx.get(ref);
      if(!fresh.exists || fresh.data().riderId){ throw new Error('TAKEN'); }
      tx.update(ref, {
        riderId: currentUser.uid, riderName: currentUserDoc.name, riderPhone: currentUserDoc.phone || '',
        status: 'accepted', riderActive: true
      });
    });
    toast('Ride accepted! Head to pickup.', 'ok');
  }catch(e){
    toast('Sorry, that ride was already taken.', 'err');
    rDeclinedIds.add(rideId); rRenderSheetIdle();
  }
}

async function riderCompleteTrip(ride){
  const commission = Math.round(ride.fare * (fareRules.commissionPct/100));
  const earning = ride.fare - commission; // rider's net take-home either way
  const isCash = ride.paymentMethod === 'cash';

  // If the app has stayed open across midnight, roll "today" over before
  // adding this trip's earnings, so they don't get folded into yesterday's total.
  if(riderDoc.todayDate !== todayKey()){
    riderDoc.todayEarnings = 0; riderDoc.todayTrips = 0; riderDoc.todayDate = todayKey();
    await db.collection('riders').doc(currentUser.uid).update({ todayEarnings:0, todayTrips:0, todayDate: todayKey() });
  }

  await db.collection('rides').doc(ride.id).update({
    status:'completed', completedAt: FieldValue.serverTimestamp(), riderActive:false,
    riderEarning: earning, riderCashCommission: isCash ? commission : 0
  });

  if(isCash){
    // Cash trips: the rider already collected the full fare in physical
    // cash from the passenger, so the wallet must NOT also be credited
    // with the earning — that would double-pay them. Instead, only the
    // platform's commission share (which the company never actually
    // received, since the money went straight to the rider) is deducted
    // from the rider's wallet balance.
    await db.collection('riders').doc(currentUser.uid).update({
      walletBalance: FieldValue.increment(-commission),
      totalEarned: FieldValue.increment(earning),
      totalTrips: FieldValue.increment(1),
      todayEarnings: FieldValue.increment(earning),
      todayTrips: FieldValue.increment(1)
    });
    await chargeCashCommission(currentUser.uid, commission, `Commission on cash trip — ${fmtNaira(ride.fare)} collected in cash`, { rideId: ride.id, method:'cash_commission' });
    riderDoc.walletBalance = (riderDoc.walletBalance||0) - commission;
    riderDoc.todayEarnings = (riderDoc.todayEarnings||0) + earning;
    riderDoc.todayTrips = (riderDoc.todayTrips||0) + 1;
    toast(`Trip completed! You collected ${fmtNaira(ride.fare)} cash. ₦${commission.toLocaleString()} commission deducted from your wallet.`, 'ok');
  } else {
    // Wallet / card trips: the platform already holds the money, so the
    // rider's net earning is credited to their wallet as usual.
    await db.collection('riders').doc(currentUser.uid).update({
      walletBalance: FieldValue.increment(earning),
      totalEarned: FieldValue.increment(earning),
      totalTrips: FieldValue.increment(1),
      todayEarnings: FieldValue.increment(earning),
      todayTrips: FieldValue.increment(1)
    });
    await creditWallet(currentUser.uid, earning, `Trip earnings — ${fmtNaira(ride.fare)} fare`, { rideId: ride.id, method:'trip_earning' });
    riderDoc.walletBalance = (riderDoc.walletBalance||0) + earning;
    riderDoc.todayEarnings = (riderDoc.todayEarnings||0) + earning;
    riderDoc.todayTrips = (riderDoc.todayTrips||0) + 1;
    toast(`Trip completed! You earned ${fmtNaira(earning)}`, 'ok');
  }

  // Check if passenger gets referral reward for first trip
  checkAndAwardReferral(ride.passengerId);
  promptRating('Rate this passenger', async (rating)=>{
    await db.collection('rides').doc(ride.id).update({ passengerRatingByRider: rating });
    const uref = db.collection('users').doc(ride.passengerId);
    const usnap = await uref.get();
    const ud = usnap.data();
    const newCount = (ud.ratingCount||0)+1;
    const newRating = (((ud.rating||5)*(ud.ratingCount||0)) + rating)/newCount;
    await uref.update({ rating:newRating, ratingCount:newCount });
  });
}

// ---- Shared: simple inline bar chart over the last N days (no chart library needed) ----
function renderDayChart(boxId, rides, numDays, valueFn, fmtFn){
  const box = $(boxId);
  if(!box) return [];
  const days = [];
  for(let i=numDays-1; i>=0; i--){
    const d = new Date();
    d.setDate(d.getDate() - i);
    d.setHours(0,0,0,0);
    days.push({ date:d, label: d.toLocaleDateString('en-NG', numDays > 7 ? {day:'numeric',month:'short'} : {weekday:'short'}), value:0 });
  }
  rides.forEach(r=>{
    const t = r.completedAt?.toDate?.() || r.createdAt?.toDate?.();
    if(!t) return;
    const dayKey = new Date(t.getFullYear(), t.getMonth(), t.getDate()).getTime();
    const match = days.find(d => d.date.getTime() === dayKey);
    if(match) match.value += valueFn(r);
  });
  const max = Math.max(1, ...days.map(d=>d.value));
  const fmt = fmtFn || (v => v.toString());
  const showLabel = numDays <= 14; // beyond that, per-bar value labels get too cramped
  box.innerHTML = `<div style="display:flex;align-items:flex-end;gap:${numDays > 14 ? 3 : 8}px;height:120px;overflow-x:auto;">
    ${days.map(d => `
      <div style="flex:1;min-width:${numDays > 14 ? '10px' : '0'};display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;">
        ${showLabel ? `<span class="meter" style="font-size:10px;margin-bottom:4px;">${fmt(d.value)}</span>` : ''}
        <div style="width:100%;border-radius:6px 6px 2px 2px;background:var(--green-100);height:${Math.max(4, (d.value/max)*84)}px;" title="${d.label}: ${fmt(d.value)}"></div>
        <span class="muted" style="font-size:9px;margin-top:6px;white-space:nowrap;">${d.label}</span>
      </div>`).join('')}
  </div>`;
  return days;
}
function renderSevenDayChart(boxId, rides, valueFn, fmtFn){
  return renderDayChart(boxId, rides, 7, valueFn, fmtFn);
}

    const todaysCompleted = completed.filter(r=>{
